<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>工地現場進度管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
/* ======================================================================
   設計變數：深藍/白/灰為主色，橘色為重點色（工程管理質感）
   ====================================================================== */
:root{
  --navy:#0F2A43; --navy-2:#16324F; --navy-3:#1E4166;
  --paper:#F3F5F8; --surface:#FFFFFF; --line:#DDE3EA; --line-strong:#C4CDD8;
  --ink:#0F2233; --ink-mute:#5C6B7A; --ink-faint:#93A0AC;
  --orange:#E8792A; --orange-soft:#FCEBDC; --orange-dk:#a8551a;
  --green:#178A4C; --green-soft:#DFF3E7; --green-dk:#0e6d3c;
  --gray:#94A0AC; --gray-soft:#EBEEF1;
  --blue:#2B6CB0; --blue-soft:#E4EEF9;
  --amber:#B8860B; --amber-soft:#FDF1DC;
  --red:#C4392F; --red-soft:#FBE2E0; --red-dk:#a12a21;
  --shadow:0 10px 28px rgba(15,42,67,0.16); --shadow-sm:0 2px 8px rgba(15,42,67,0.10);
  --radius:12px;
  --font-display:'Space Grotesk','Noto Sans TC',sans-serif;
  --font-body:'Noto Sans TC',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font-body); background:var(--paper); color:var(--ink);
  background-image:linear-gradient(var(--line) 1px, transparent 1px),linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size:28px 28px; background-attachment:fixed; -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;} input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{height:10px;width:10px;} ::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:6px;}

/* ---------- 版面骨架 ---------- */
.app-shell{display:flex;min-height:100vh;}
.overlay-scrim{display:none;}
.overlay-scrim.show{display:block;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:35;}

/* ---------- 側邊欄（案場清單） ---------- */
.sidebar{width:260px;flex-shrink:0;background:var(--navy);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;transform:translateX(0);transition:transform .25s ease;z-index:40;}
.sidebar-brand{padding:20px 18px 14px;border-bottom:1px solid rgba(255,255,255,0.12);}
.sidebar-brand .mark{font-family:var(--font-display);font-weight:700;font-size:18px;color:#fff;display:flex;align-items:center;gap:8px;}
.sidebar-brand .sub{font-family:var(--font-mono);font-size:10.5px;color:var(--orange);margin-top:4px;letter-spacing:.06em;}
.sidebar-section{padding:14px 14px 6px;font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;color:rgba(255,255,255,0.45);text-transform:uppercase;display:flex;justify-content:space-between;align-items:center;}
.sidebar-section button{background:none;border:none;color:var(--orange);font-size:16px;line-height:1;padding:2px 6px;border-radius:5px;}
.sidebar-section button:hover{background:rgba(255,255,255,0.1);}
.project-list{list-style:none;margin:0;padding:0 10px;overflow-y:auto;flex:1;}
.project-item{display:flex;align-items:center;gap:8px;padding:10px;border-radius:8px;margin-bottom:3px;color:rgba(255,255,255,0.78);font-size:14px;}
.project-item:hover{background:rgba(255,255,255,0.06);}
.project-item.active{background:var(--orange);color:#fff;font-weight:700;}
.project-item .p-name{flex:1;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.project-item .p-actions{display:none;gap:2px;}
.project-item:hover .p-actions, .project-item.active .p-actions{display:flex;}
.icon-btn{background:none;border:none;color:inherit;opacity:.75;padding:3px;border-radius:5px;display:flex;}
.icon-btn:hover{opacity:1;background:rgba(0,0,0,0.12);}
.sidebar-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,0.12);font-family:var(--font-mono);font-size:10.5px;color:rgba(255,255,255,0.4);display:flex;justify-content:space-between;align-items:center;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-right:5px;box-shadow:0 0 0 3px rgba(23,138,76,0.25);}

/* ---------- 主要區域 ---------- */
.main{margin-left:260px;flex:1;min-width:0;display:flex;flex-direction:column;min-height:100vh;padding-bottom:0;}
.topbar{background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20;padding:12px 22px;}
.topbar-row1{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.hamburger{display:none;background:none;border:1px solid var(--line);border-radius:8px;padding:7px 9px;flex-shrink:0;}
.app-title{font-family:var(--font-display);font-weight:700;font-size:19px;color:var(--navy);}
.app-title .site-sub{font-family:var(--font-mono);font-size:11.5px;color:var(--ink-faint);font-weight:400;}
.topbar-actions{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;}
.btn{border:1px solid var(--line-strong);background:var(--surface);color:var(--ink);padding:9px 14px;border-radius:9px;font-size:13.5px;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:all .12s;white-space:nowrap;}
.btn:hover{border-color:var(--navy-3);background:var(--paper);}
.btn-primary{background:var(--orange);border-color:var(--orange);color:#fff;}
.btn-primary:hover{background:#d76b1f;border-color:#d76b1f;}
.btn-navy{background:var(--navy);border-color:var(--navy);color:#fff;}
.btn-navy:hover{background:var(--navy-2);}
.btn-ghost{border-color:transparent;background:transparent;}
.btn-ghost:hover{background:var(--gray-soft);}
.btn-danger{color:var(--red);}
.btn-sm{padding:6px 10px;font-size:12.5px;border-radius:7px;}
.btn-lg{padding:14px 20px;font-size:15px;border-radius:12px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-block{width:100%;justify-content:center;}

.tabs{display:flex;gap:4px;margin-top:12px;overflow-x:auto;}
.tab-btn{padding:9px 14px;border-radius:9px 9px 0 0;font-size:13.5px;font-weight:700;color:var(--ink-mute);background:transparent;border:none;border-bottom:3px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:6px;}
.tab-btn.active{color:var(--navy);border-bottom-color:var(--orange);}
.building-tabs{display:flex;gap:6px;margin-top:10px;overflow-x:auto;padding-bottom:2px;}
.building-chip{padding:7px 14px;border-radius:20px;font-size:13px;font-weight:700;border:1.5px solid var(--line-strong);background:var(--surface);color:var(--ink-mute);white-space:nowrap;display:flex;align-items:center;gap:6px;}
.building-chip.active{background:var(--navy);border-color:var(--navy);color:#fff;}
.building-chip .bc-edit{opacity:.6;font-size:11px;}
.building-chip.active .bc-edit{opacity:.85;}

.content{padding:20px 22px 90px;flex:1;}
.empty-state{text-align:center;padding:70px 20px;color:var(--ink-faint);}
.empty-state h3{font-family:var(--font-display);color:var(--ink-mute);margin:0 0 6px;}

/* ---------- 狀態徽章 ---------- */
.badge{font-family:var(--font-mono);font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.badge .dot{width:6px;height:6px;border-radius:50%;display:inline-block;}

/* ---------- 首頁儀表板 ---------- */
.hero-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
.home-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-bottom:18px;}
.home-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow-sm);}
.home-card h4{margin:0 0 12px;font-family:var(--font-display);font-size:15.5px;color:var(--navy);display:flex;align-items:center;justify-content:space-between;gap:8px;}
.home-card h4 .cnt-pill{font-family:var(--font-mono);font-size:11px;background:var(--gray-soft);color:var(--ink-mute);padding:2px 9px;border-radius:10px;font-weight:700;}
.home-card h4 .cnt-pill.warn{background:var(--red-soft);color:var(--red-dk);}
.task-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px dashed var(--line);cursor:pointer;}
.task-row:last-child{border-bottom:none;}
.task-row:hover{background:var(--paper);margin:0 -8px;padding:10px 8px;border-radius:8px;}
.task-row .t-main{flex:1;min-width:0;}
.task-row .t-title{font-size:13.5px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.task-row .t-sub{font-size:11.5px;color:var(--ink-faint);font-family:var(--font-mono);margin-top:2px;}
.site-progress-row{padding:12px 0;border-bottom:1px solid var(--line);cursor:pointer;}
.site-progress-row:last-child{border-bottom:none;}
.site-progress-row:hover{background:var(--paper);margin:0 -8px;padding:12px 8px;border-radius:8px;}
.spr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.spr-name{font-weight:700;color:var(--navy);font-size:14.5px;}
.spr-pct{font-family:var(--font-mono);font-weight:700;color:var(--navy);}
.progress-bar{height:8px;background:var(--gray-soft);border-radius:5px;overflow:hidden;}
.progress-bar>div{height:100%;background:linear-gradient(90deg,var(--orange),var(--green));border-radius:5px;}
.spr-meta{font-size:11.5px;color:var(--ink-faint);margin-top:6px;font-family:var(--font-mono);}
.empty-mini{color:var(--ink-faint);font-size:12.5px;padding:8px 0;}

/* ---------- 棟別看板 ---------- */
.building-board{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;}
.bboard-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow-sm);}
.bboard-card h4{margin:0 0 4px;font-family:var(--font-display);font-size:17px;color:var(--navy);}
.bboard-card .floors-sub{font-family:var(--font-mono);font-size:11.5px;color:var(--ink-faint);margin-bottom:10px;}
.bboard-big{font-family:var(--font-display);font-size:32px;font-weight:700;color:var(--navy);line-height:1;}
.bboard-current{margin-top:12px;padding-top:12px;border-top:1px dashed var(--line);}
.bboard-current .lbl{font-size:11px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.05em;font-family:var(--font-mono);}
.bboard-current .val{font-size:14px;font-weight:700;color:var(--ink);margin-top:3px;}
.bboard-actions{display:flex;gap:8px;margin-top:14px;}

/* ---------- 矩陣 ---------- */
.matrix-wrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:auto;box-shadow:var(--shadow-sm);max-width:100%;}
table.matrix{border-collapse:separate;border-spacing:0;min-width:100%;user-select:none;}
table.matrix thead th{position:sticky;top:0;background:var(--navy);color:#fff;z-index:5;font-family:var(--font-mono);font-size:11.5px;font-weight:600;padding:10px 8px;text-align:center;min-width:96px;border-right:1px solid rgba(255,255,255,0.12);}
table.matrix thead th.floor-head{position:sticky;left:0;top:0;z-index:6;min-width:64px;}
table.matrix tbody td.floor-cell{position:sticky;left:0;z-index:3;background:var(--paper);font-family:var(--font-mono);font-weight:700;font-size:13px;color:var(--navy);text-align:center;padding:9px 6px;border-right:1px solid var(--line-strong);border-bottom:1px solid var(--line);min-width:64px;}
table.matrix tbody tr:nth-child(even) td.floor-cell{background:#EAEDF1;}
table.matrix tbody td.mx-cell{border-bottom:1px solid var(--line);border-right:1px solid var(--line);padding:5px;text-align:center;cursor:pointer;min-width:96px;}
table.matrix tbody td.mx-cell:hover{background:var(--blue-soft);}
.cell-pill{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:100%;min-height:38px;border-radius:7px;font-family:var(--font-mono);}
.cell-pill .pct{font-size:13px;font-weight:700;} .cell-pill .cnt{font-size:9.5px;opacity:.75;}
.cell-empty{color:var(--ink-faint);font-size:16px;}
.st-none{background:transparent;color:var(--ink-faint);}
.st-progress{background:var(--orange-soft);color:var(--orange-dk);}
.st-done{background:var(--green-soft);color:var(--green-dk);}
.st-delayed{background:var(--red-soft);color:var(--red-dk);}
.legend{display:flex;gap:16px;align-items:center;margin-top:12px;flex-wrap:wrap;font-size:12.5px;color:var(--ink-mute);}
.legend-sw{width:12px;height:12px;border-radius:3px;display:inline-block;margin-right:5px;vertical-align:-1px;}

/* ---------- 實際進度表（位置 × 樓層 × 工項） ---------- */
.actual-toolbar{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:12px 14px;margin-bottom:14px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;box-shadow:var(--shadow-sm);}
.actual-toolbar .actual-title{font-family:var(--font-display);font-weight:700;color:var(--navy);font-size:16px;margin-right:auto;}
.actual-table-wrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:auto;margin-bottom:16px;}
.actual-grid{border-collapse:collapse;min-width:1180px;width:max-content;table-layout:fixed;background:#fff;}
.actual-grid th,.actual-grid td{border:1px dotted #4D5560;text-align:center;vertical-align:middle;}
.actual-grid thead th{position:sticky;top:0;background:#fff;color:#111;z-index:6;font-size:12px;font-weight:700;height:28px;white-space:nowrap;}
.actual-grid .actual-stage-col{position:sticky;left:0;z-index:7;width:42px;min-width:42px;background:#fff;border-left:2px solid #111;border-right:2px solid #111;}
.actual-grid .actual-floor-col{position:sticky;left:42px;z-index:7;width:56px;min-width:56px;background:#fff;border-right:2px solid #111;font-family:var(--font-mono);font-weight:700;}
.actual-grid thead .actual-stage-col,.actual-grid thead .actual-floor-col{z-index:9;background:#fff;border-top:2px solid #111;}
.actual-grid .actual-group-head{border-top:2px solid #111;border-left:2px solid #111;border-right:2px solid #111;font-size:15px;font-weight:900;background:#fff;height:30px;}
.actual-grid .actual-part-head{height:42px;font-size:12px;font-weight:500;background:#fff;min-width:82px;width:82px;position:relative;}
.actual-grid .actual-part-head.actual-empty-name,.actual-grid .actual-floor.actual-empty-name{color:#bbb;}
.actual-grid .actual-section-label{position:sticky;left:0;z-index:5;background:#fff;border-left:2px solid #111;border-right:2px solid #111;font-weight:900;writing-mode:vertical-rl;letter-spacing:.08em;min-width:42px;width:42px;}
.actual-grid .actual-floor{position:sticky;left:42px;z-index:5;background:#fff;border-right:2px solid #111;font-family:var(--font-mono);font-size:13px;font-weight:700;min-width:56px;width:56px;}
.actual-grid .actual-cell{height:24px;min-width:82px;width:82px;cursor:pointer;position:relative;background:#fff;}
.actual-grid .actual-cell:hover{outline:2px solid var(--orange);outline-offset:-2px;background:var(--orange-soft);}
.actual-grid .actual-cell.actual-selected{box-shadow:inset 0 0 0 3px var(--orange);}
.actual-grid .actual-cell.actual-blank{background:#fff;}
.actual-grid .actual-cell.actual-slash{background:#fff;}
.actual-grid .actual-cell.actual-slash::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom right, transparent calc(50% - 0.7px), #111 calc(50% - 0.7px), #111 calc(50% + 0.7px), transparent calc(50% + 0.7px));pointer-events:none;}
.actual-grid .actual-cell.actual-layout-done{background:#C9CED6;}
.actual-grid .actual-cell.actual-frame-material{background:#D8ECFF;}
.actual-grid .actual-cell.actual-frame-install{background:#87BFF1;}
.actual-grid .actual-cell.actual-frame-done{background:#2F7FC1;}
.actual-grid .actual-cell.actual-frame-survey{background:#0F3F75;}
.actual-grid .actual-cell.actual-panel-cutting{background:#FFE3B8;}
.actual-grid .actual-cell.actual-panel-install{background:#F5B15C;}
.actual-grid .actual-cell.actual-panel-done{background:#C85B16;}
.actual-grid .actual-cell.actual-silicone{background:#42B883;}
.actual-grid .actual-cell.actual-repair{background:#8B5CF6;}
.actual-grid .actual-cell.actual-clean{background:#2F855A;}
.actual-grid .actual-cell.actual-delayed{background:#C4392F;}
.actual-grid .actual-cell .actual-pct{font-family:var(--font-mono);font-size:10.5px;font-weight:900;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.28);line-height:1.05;display:inline-block;max-width:78px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.actual-grid .actual-cell.actual-layout-done .actual-pct,.actual-grid .actual-cell.actual-frame-material .actual-pct,.actual-grid .actual-cell.actual-panel-cutting .actual-pct{color:#111;text-shadow:none;}
.actual-legend{display:flex;flex-wrap:wrap;align-items:center;gap:8px 13px;font-size:12.5px;color:var(--ink-mute);margin:8px 0 16px;}
.actual-legend .sw{width:28px;height:14px;border-radius:2px;border:1px solid rgba(0,0,0,.14);display:inline-block;margin-right:5px;vertical-align:-2px;}
.actual-note{font-size:12px;color:var(--ink-faint);line-height:1.6;margin-top:4px;width:100%;}
.actual-palette{display:flex;flex-wrap:wrap;gap:6px;margin:4px 0 12px;}
.actual-status-btn{border:1px solid var(--line-strong);border-radius:8px;padding:7px 9px;background:#fff;font-size:12px;font-weight:700;color:var(--ink);display:inline-flex;align-items:center;gap:6px;}
.actual-status-btn .sw{width:18px;height:12px;border:1px solid rgba(0,0,0,.18);border-radius:2px;}
.actual-status-btn.selected{box-shadow:0 0 0 2px var(--orange) inset;border-color:var(--orange);}
.actual-settings-help{font-size:12px;color:var(--ink-faint);line-height:1.6;margin-top:4px;}
@media (max-width:860px){.actual-grid{min-width:980px}.actual-grid .actual-part-head,.actual-grid .actual-cell{min-width:70px;width:70px}.actual-toolbar{align-items:flex-start}.actual-toolbar .actual-title{width:100%;}}
.actual-print-page{width:279mm;min-height:192mm;margin:0 auto;background:#fff;color:#111;display:flex;flex-direction:column;gap:2mm;overflow:hidden;}
.actual-print-head{display:flex;justify-content:space-between;align-items:flex-start;font-family:var(--font-body);font-size:10px;margin-bottom:1mm;}
.actual-print-head strong{font-size:14px;color:#000;}
.actual-print-table{border-collapse:collapse;table-layout:fixed;width:100%;font-family:'Noto Sans TC',sans-serif;}
.actual-print-table th,.actual-print-table td{border:0.15mm dotted #333;text-align:center;vertical-align:middle;padding:0;}
.actual-print-table .actual-stage-col{width:8mm;border-left:0.3mm solid #111;border-right:0.3mm solid #111;}
.actual-print-table .actual-floor-col{width:10mm;border-right:0.3mm solid #111;}
.actual-print-table .actual-group-head{border:0.3mm solid #111;font-size:8px;height:5mm;}
.actual-print-table .actual-part-head{font-size:6.5px;height:9mm;width:9mm;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.actual-print-table .actual-section-label{writing-mode:vertical-rl;font-size:8px;font-weight:900;width:8mm;border-left:0.3mm solid #111;border-right:0.3mm solid #111;}
.actual-print-table .actual-floor{font-size:7px;font-weight:700;width:10mm;border-right:0.3mm solid #111;}
.actual-print-table .actual-cell{height:4.8mm;width:9mm;position:relative;}
.actual-print-table .actual-cell .actual-pct{font-size:5.5px;max-width:8.5mm;}
.actual-print-legend{display:flex;flex-wrap:wrap;gap:2mm 4mm;font-size:7px;margin-top:1mm;}
.actual-print-legend .sw{width:6mm;height:3mm;border:0.1mm solid rgba(0,0,0,.35);display:inline-block;margin-right:1mm;vertical-align:-0.6mm;}
/* ---------- Gantt ---------- */
.gantt-scroll{overflow:auto;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow-sm);max-height:min(72vh,700px);}
.gantt-grid{display:grid;position:relative;}
.gt-corner{position:sticky;top:0;left:0;z-index:9;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;border-right:1px solid rgba(255,255,255,0.15);border-bottom:1px solid rgba(255,255,255,0.15);}
.gt-head-cell{position:sticky;top:0;z-index:6;background:var(--navy);color:rgba(255,255,255,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;border-right:1px solid rgba(255,255,255,0.1);border-bottom:1px solid rgba(255,255,255,0.15);font-family:var(--font-mono);}
.gt-head-cell.gt-weekend{background:var(--navy-2);} .gt-head-cell.gt-today{background:var(--orange);color:#fff;}
.gt-date-d{font-size:11px;font-weight:700;} .gt-date-w{font-size:9px;opacity:.75;}

<script>
/* =========================================================================
   工地現場進度管理工具 — 單檔 App
   資料層級：案場(專案) → 棟別 → 樓層 → 部位 → 工序 → 進度% / 狀態 / 備註 / 照片 / 負責工班
   跨裝置同步：Claude Artifact 內用 window.storage；自行部署時可透過 Supabase 連動手機與電腦
   ========================================================================= */

/* =====================  1. 常數與工具函式  ===================== */
const STORAGE_KEY = 'cpm_data_v8_floor_safe_click';

// 工序狀態：矩陣顯示時歸類為 4 色（灰／橘／綠／紅）
const STATUS = {
  not_started:      { label:'未開始', fg:'#5C6B7A', bg:'#EBEEF1', dot:'#94A0AC', bucket:'none' },
  in_progress:      { label:'進行中', fg:'#a8551a', bg:'#FCEBDC', dot:'#E8792A', bucket:'progress' },

  waiting_contract: { label:'待簽約', fg:'#8a4f7d', bg:'#F5E9F2', dot:'#8a4f7d', bucket:'progress' },
  waiting_cutting:  { label:'待下料', fg:'#1f7a70', bg:'#E2F2F0', dot:'#1f7a70', bucket:'progress' },
  pending_confirm:  { label:'待確認', fg:'#2B6CB0', bg:'#E4EEF9', dot:'#2B6CB0', bucket:'progress' },
  blocked_predecessor:{ label:'卡前置', fg:'#9c4a13', bg:'#FBE9DC', dot:'#c0631f', bucket:'progress' },

};
const STATUS_ORDER = ['not_started','in_progress','waiting_material','waiting_quote','waiting_contract','waiting_cutting','pending_confirm','blocked_predecessor','waiting_billing','delayed','done'];

function uid(prefix){ return prefix+'_'+Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4); }
function esc(s){ return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function clamp(n,min,max){ return Math.max(min,Math.min(max,n)); }
function cssEscape(s){ return (typeof CSS!=='undefined'&&CSS.escape)?CSS.escape(s):String(s).replace(/["\\]/g,'\\$&'); }
function fmtTime(ts){ if(!ts) return ''; const d=new Date(ts); const p=n=>String(n).padStart(2,'0'); return `${d.getMonth()+1}/${d.getDate()} ${p(d.getHours())}:${p(d.getMinutes())}`; }
function toDateStr(d){ const p=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`; }
function fromDateStr(s){ const [y,m,dd]=s.split('-').map(Number); return new Date(y,m-1,dd); }
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function diffDays(a,b){ return Math.round((b-a)/86400000); }
function todayStr(){ return toDateStr(new Date()); }
function statusInfo(key){ return STATUS[key] || STATUS.not_started; }

function generateFloors(top, rCount, bottom){
  const floors=[]; rCount = clamp(rCount||0,0,20);
  for(let i=rCount;i>=1;i--) floors.push('R'+i);
  top=Number(top); bottom=Number(bottom);
  if(isNaN(top)||isNaN(bottom)||top<bottom) return floors;
  for(let f=top; f>=bottom; f--){ if(f===0) continue; floors.push(f>0?(f+'F'):('B'+(-f))); }
  return floors;
}
// 將一組樓層依棟別樓層順序，壓縮成連續區間文字，如 20F–16F、R1
function compressFloorLabel(b, floorIds){
  const idx = new Map(b.floors.map((f,i)=>[f,i]));
  const sorted = [...floorIds].filter(f=>idx.has(f)).sort((a,c)=>idx.get(a)-idx.get(c));
  if(sorted.length===0) return '';
  const runs=[]; let run=[sorted[0]];
  for(let i=1;i<sorted.length;i++){
    if(idx.get(sorted[i])===idx.get(sorted[i-1])+1){ run.push(sorted[i]); }
    else{ runs.push(run); run=[sorted[i]]; }
  }
  runs.push(run);
  return runs.map(r=> r.length>1 ? `${r[0]}–${r[r.length-1]}` : r[0]).join('、');
}

// 輔助：產生樓層字串陣列，如 floorsSpan(21,11) → ['21F',...,'11F']
function floorsSpan(from, to){ const arr=[]; for(let f=from; f>=to; f--) arr.push(f+'F'); return arr; }
// 輔助：以棟別(含樓層)與工項清單快速建案場；items 中 fl 可為單一樓層或樓層陣列（每層各建一筆記錄）
function buildHandoverProject(cfg){
  const p = { id:uid('p'), name:cfg.name, createdAt:Date.now(),
    processes: cfg.processNames.map(n=>({id:uid('pr'), name:n, groupId:null})),
    parts: [], processGroups: [],
    buildings: cfg.buildings.map(bd=>({id:uid('b'), name:bd.name, floors:[...bd.floors]})),
    records: [], schedules: [],
    contacts: cfg.contacts||[], vendors: cfg.vendors||[],
    storageArea: cfg.storageArea||'', entryRules: cfg.entryRules||'',
    handoverSummary: cfg.handoverSummary||'', billingItems: cfg.billingItems||[] };
  const now = Date.now();
  (cfg.items||[]).forEach(it=>{
    const b = p.buildings.find(x=>x.name===it.b) || p.buildings[0];
    const pr = p.processes.find(x=>x.name===it.pr);
    if(!b || !pr) return;
    const floors = Array.isArray(it.fl) ? it.fl : [it.fl || b.floors[0]];
    floors.forEach(fl=>{
      if(!b.floors.includes(fl)) return; // 防呆：樓層需存在於棟別中
      p.records.push({ id:uid('r'), buildingId:b.id, floor:fl, processId:pr.id, partIds:[],
        progress: it.pg!==undefined?it.pg:(it.st==='done'?100:(it.st==='not_started'?0:30)),
        status: it.st||'in_progress', note: it.note||'', crew: it.crew||'', photo:null,
        blockReason: it.blk||'', updatedAt: now });
    });
  });
  return p;
}

/* =====================  3. 狀態容器與存取層  ===================== */
let state = null;
let saveTimer = null;
let refreshTimer = null;
let formState = {}; // modal 暫存互動狀態

/* ---------- 儲存轉接層：
   1) Claude Artifact 內：使用 window.storage 雲端同步。
   2) 自行部署 / 一般瀏覽器：可在「同步設定」填入 Supabase URL + anon key，讓手機與電腦開同一網址時共用資料。
   3) 若未設定雲端：自動 fallback 到 localStorage（僅此裝置）。 ---------- */
const HAS_CLAUDE_CLOUD = (typeof window!=='undefined') && !!window.storage && typeof window.storage.get==='function';
const SUPABASE_SYNC_CONFIG_KEY = 'cpm_supabase_sync_config_v1';
const SUPABASE_TABLE_DEFAULT = 'site_progress_state';
const SUPABASE_ROW_DEFAULT = 'main';
const SYNC_POLL_INTERVAL_MS = 15000;
let supabaseClient = null;

function loadSyncConfig(){
  try{
    const raw = localStorage.getItem(SUPABASE_SYNC_CONFIG_KEY);
    const cfg = raw ? JSON.parse(raw) : {};
    return {
      url: cfg.url || '',
      anonKey: cfg.anonKey || '',
      table: cfg.table || SUPABASE_TABLE_DEFAULT,
      rowId: cfg.rowId || SUPABASE_ROW_DEFAULT
    };
  }catch(e){
    return { url:'', anonKey:'', table:SUPABASE_TABLE_DEFAULT, rowId:SUPABASE_ROW_DEFAULT };
  }
}
let syncConfig = loadSyncConfig();
function hasSupabaseConfig(){ return !!(syncConfig.url && syncConfig.anonKey); }
function isCloudEnabled(){ return HAS_CLAUDE_CLOUD || hasSupabaseConfig(); }
function syncModeLabel(){
  if(HAS_CLAUDE_CLOUD) return 'Claude雲端同步';
  if(hasSupabaseConfig()) return 'Supabase同步';
  return '本機模式';
}
function syncModeDetail(){
  if(HAS_CLAUDE_CLOUD) return '已同步（跨裝置）';
  if(hasSupabaseConfig()) return 'Supabase同步（跨裝置）';
  return '本機模式（僅此裝置）';
}
function getSupabaseClient(){
  if(!hasSupabaseConfig()) return null;
  if(!window.supabase || typeof window.supabase.createClient!=='function'){
    throw new Error('Supabase CDN 未載入，請確認網路連線');
  }
  if(!supabaseClient){
    supabaseClient = window.supabase.createClient(syncConfig.url, syncConfig.anonKey);
  }
  return supabaseClient;
}

const store = {
  async get(key){
    if(HAS_CLAUDE_CLOUD){
      try{ return await window.storage.get(key); }catch(e){ return null; }
    }
    if(hasSupabaseConfig()){
      try{
        const client = getSupabaseClient();
        const { data, error } = await client
          .from(syncConfig.table)
          .select('data,updated_at')
          .eq('id', syncConfig.rowId)
          .maybeSingle();
        if(error) throw error;
        return data && data.data ? { key, value: JSON.stringify(data.data) } : null;
      }catch(e){
        console.warn('Supabase 讀取失敗，暫用本機快取', e);
        const cached = localStorage.getItem(key);
        return cached!==null ? {key, value:cached} : null;
      }
    }
    const v = localStorage.getItem(key);
    return v!==null ? {key, value:v} : null;
  },
  async set(key, value){
    if(HAS_CLAUDE_CLOUD){ return await window.storage.set(key, value); }
    if(hasSupabaseConfig()){
      let parsed;
      try{ parsed = JSON.parse(value); }catch(e){ parsed = value; }
      try{
        const client = getSupabaseClient();
        const { error } = await client
          .from(syncConfig.table)
          .upsert({ id: syncConfig.rowId, data: parsed, updated_at: new Date().toISOString() }, { onConflict:'id' });
        if(error) throw error;
        localStorage.setItem(key, value); // 本機快取，離線時可讀
        return {key, value};
      }catch(e){
        console.warn('Supabase 儲存失敗，先存入本機', e);
        localStorage.setItem(key, value);
        throw e;
      }
    }
    localStorage.setItem(key, value);
    return {key, value};
  }
};

async function loadState(){
  try{
    const res = await store.get(STORAGE_KEY);
    state = (res && res.value) ? JSON.parse(res.value) : null;
  }catch(e){ state = null; }
  if(!state || !Array.isArray(state.projects) || state.projects.length===0){
    state = defaultState();
    try{ await store.set(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
  }
  // 向下相容：補齊可能缺少的欄位
  state.projects.forEach(p=>{
    if(!Array.isArray(p.schedules)) p.schedules=[];
    if(!Array.isArray(p.processGroups)) p.processGroups=[];
    if(!Array.isArray(p.contacts)) p.contacts=[];
    if(!Array.isArray(p.vendors)) p.vendors=[];
    if(p.storageArea===undefined) p.storageArea='';
    if(p.entryRules===undefined) p.entryRules='';
    if(p.handoverSummary===undefined) p.handoverSummary='';
    if(!Array.isArray(p.billingItems)) p.billingItems=[];
    (p.processes||[]).forEach(pr=>{ if(pr.groupId===undefined) pr.groupId=null; });
    (p.records||[]).forEach(r=>{ if(!r.status) r.status = r.progress>=100?'done':'not_started'; if(r.crew===undefined) r.crew=''; if(r.photo===undefined) r.photo=null; if(r.blockReason===undefined) r.blockReason=''; });
    (p.schedules||[]).forEach(s=>{ if(s.actualCompleteDate===undefined) s.actualCompleteDate=null; if(!Array.isArray(s.dependsOn)) s.dependsOn=[]; });
  });
  if(!Array.isArray(state.quickTemplates)) state.quickTemplates = [];
  if(!state.view) state.view = 'home';
  if(!state.matrixMode) state.matrixMode = 'single';
  if(!state.ganttMode) state.ganttMode = 'single';
  if(!state.ganttRange) state.ganttRange = {start:'', end:''};
  if(!state.activeProjectId || !state.projects.find(p=>p.id===state.activeProjectId)) state.activeProjectId = state.projects[0].id;
  const proj = currentProject();
  if(proj && (!state.activeBuildingId || !proj.buildings.find(b=>b.id===state.activeBuildingId))){
    state.activeBuildingId = proj.buildings[0] ? proj.buildings[0].id : null;
  }
  render();
  startAutoRefresh();
}
function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try{ await store.set(STORAGE_KEY, JSON.stringify(state)); setSyncStatus(true); }
    catch(e){ setSyncStatus(false); showToast('儲存失敗，請檢查網路連線','error'); }
  }, 350);
}
function setSyncStatus(ok){
  const dot=document.getElementById('sync-indicator');
  if(dot){ dot.style.background = ok?'var(--green)':'var(--red)'; dot.title = syncModeDetail(); }
}
function startAutoRefresh(){
  clearInterval(refreshTimer);
  if(!isCloudEnabled()) return; // 本機模式無雲端資料可輪詢
  refreshTimer = setInterval(async ()=>{
    if(document.hidden || document.querySelector('.modal-overlay')) return;
    try{
      const res = await store.get(STORAGE_KEY);
      if(res && res.value){
        const remote = JSON.parse(res.value);
        if(JSON.stringify(remote)!==JSON.stringify(state)){
          state = remote;
          if(!state.projects.find(p=>p.id===state.activeProjectId)) state.activeProjectId = state.projects[0]?.id;
          setSyncStatus(true);
          render();
        }
      }
    }catch(e){ setSyncStatus(false); }
  }, SYNC_POLL_INTERVAL_MS);
}
async function manualRefresh(){
  if(!isCloudEnabled()){ showToast('目前為本機模式（無雲端同步）'); return; }
  try{
    const res = await store.get(STORAGE_KEY);
    if(res && res.value){ state=JSON.parse(res.value); render(); showToast('已更新至最新資料'); }
    else showToast('雲端尚無資料，可先到同步設定上傳目前資料');
    setSyncStatus(true);
  }
  catch(e){ setSyncStatus(false); showToast('更新失敗，請檢查同步設定','error'); }
}

/* ---------- 取用輔助 ---------- */
function currentProject(){ return state.projects.find(p=>p.id===state.activeProjectId) || null; }
function currentBuilding(){ const proj=currentProject(); if(!proj) return null; return proj.buildings.find(b=>b.id===state.activeBuildingId) || proj.buildings[0] || null; }
function getRecords(projId, buildingId, floor, processId){
  const proj = state.projects.find(p=>p.id===projId); if(!proj) return [];
  return proj.records.filter(r=>r.buildingId===buildingId && r.floor===floor && r.processId===processId);
}
function cellBucket(records){
  if(records.length===0) return {bucket:'none', avg:0, count:0};
  const avg = Math.round(records.reduce((s,r)=>s+r.progress,0)/records.length);
  let bucket = 'progress';
  if(records.some(r=>r.status==='delayed')) bucket='delayed';
  else if(records.every(r=>r.status==='done')) bucket='done';
  return {bucket, avg, count:records.length};
}
function partNames(proj, ids){ if(!ids||ids.length===0) return '全區域'; return ids.map(id=>{const p=proj.parts.find(x=>x.id===id);return p?p.name:null;}).filter(Boolean).join('、'); }
// 該棟「樓層×工序」整體平均（含未施作項目視為0%）
function buildingProcessAverages(proj, b){
  return proj.processes.map(pr=>{
    let sum=0;
    b.floors.forEach(fl=>{ sum += cellBucket(getRecords(proj.id,b.id,fl,pr.id)).avg; });
    const avg = b.floors.length ? Math.round(sum/b.floors.length) : 0;
    return {process:pr, avg};
  });
}
function buildingOverallAvg(proj,b){
  const avgs = buildingProcessAverages(proj,b);
  return avgs.length ? Math.round(avgs.reduce((s,x)=>s+x.avg,0)/avgs.length) : 0;
}
function projectOverallAvg(proj){
  if(proj.buildings.length===0) return 0;
  const vals = proj.buildings.map(b=>buildingOverallAvg(proj,b));
  return Math.round(vals.reduce((a,c)=>a+c,0)/vals.length);
}
// 專案內所有「延誤」來源：狀態=delayed 的記錄 ＋ 已逾預定完成日卻未填實際完成日的排程
function projectDelayItems(proj){
  const items = [];
  proj.records.filter(r=>r.status==='delayed').forEach(r=>{
    const b = proj.buildings.find(x=>x.id===r.buildingId); const pr = proj.processes.find(x=>x.id===r.processId);
    if(!b||!pr) return;
    items.push({type:'record', proj, b, pr, floor:r.floor, note:r.note, updatedAt:r.updatedAt, recordId:r.id});
  });
  const today = todayStr();
  proj.schedules.filter(s=>!s.actualCompleteDate && s.endDate < today).forEach(s=>{
    const b = proj.buildings.find(x=>x.id===s.buildingId); const pr = proj.processes.find(x=>x.id===s.processId);
    if(!b||!pr) return;
    items.push({type:'schedule', proj, b, pr, floor:compressFloorLabel(b,s.floors), note:s.note, updatedAt:fromDateStr(s.endDate).getTime(), scheduleId:s.id, endDate:s.endDate});
  });
  return items;
}
// 今日待辦：排程日期涵蓋今天、尚未標記實際完成
function projectTodayTasks(proj){
  const today = todayStr();
  return proj.schedules.filter(s=>!s.actualCompleteDate && s.startDate<=today && s.endDate>=today).map(s=>{
    const b = proj.buildings.find(x=>x.id===s.buildingId); const pr = proj.processes.find(x=>x.id===s.processId);
    return b&&pr ? {proj,b,pr,floor:compressFloorLabel(b,s.floors),scheduleId:s.id,endDate:s.endDate} : null;
  }).filter(Boolean);
}

function showToast(msg, type){
  const root = document.getElementById('toast-root');
  const el = document.createElement('div');
  el.className = 'toast'+(type==='error'?' error':'');

}

function toggleReportMode(){ formState.reportMode = !formState.reportMode; render(); }

  state.activeBuildingId = r.buildingId;
  formState.cell = {buildingId:r.buildingId, floor:r.floor, processId:r.processId};
  openRecordForm(r.buildingId, r.floor, r.processId, r.id);

function reportFromSchedule(projId, scheduleId){
  state.activeProjectId = projId;
  const proj = currentProject();
  const s = proj.schedules.find(x=>x.id===scheduleId); if(!s){ showToast('找不到此筆排程','error'); return; }
  state.activeBuildingId = s.buildingId;
  formState.quickAdd = { projectId:projId, buildingId:s.buildingId, floors:[...s.floors], partIds:[],
    processId:s.processId, progress:50, status:'in_progress', note:'', crew:'', photo:null, blockReason:'' };
  renderQuickAddForm();
}
function renderTodayReport(){
  const projects = state.projects;
  const today = todayStr();
  const yesterday = toDateStr(addDays(new Date(), -1));
  // 今日預定施作
  const todayItems = [];
  projects.forEach(p=> projectTodayTasks(p).forEach(t=>todayItems.push(t)) );
  // 昨日未完成：昨天有更新但進度未達100%且未標完成的記錄
  const yestItems = [];
  projects.forEach(p=> p.records.forEach(r=>{
    if(toDateStr(new Date(r.updatedAt))===yesterday && r.progress<100 && r.status!=='done'){
      const b=p.buildings.find(x=>x.id===r.buildingId), pr=p.processes.find(x=>x.id===r.processId);
      if(b&&pr) yestItems.push({p,r,b,pr});
    }
  }));
  // 延誤項目
  const delayItems = [];
  projects.forEach(p=> projectDelayItems(p).forEach(d=>delayItems.push(d)) );

  const todayHtml = todayItems.length ? todayItems.map(t=>`
    <div class="task-row">
      <div class="t-main">
        <div class="t-title">${esc(t.proj.name)}　${esc(t.b.name)}　${esc(t.floor)}・${esc(t.pr.name)}</div>
        <div class="t-sub">預定完成：${esc(t.endDate)}</div>
      </div>
      <button class="btn btn-sm btn-primary" onclick="reportFromSchedule('${t.proj.id}','${t.scheduleId}')">回報進度</button>
    </div>`).join('') : '<div class="empty-mini">今天沒有排定中的工項</div>';

  const yestHtml = yestItems.length ? yestItems.map(({p,r,b,pr})=>{
    const si = statusInfo(r.status);
    return `<div class="task-row">
      <div class="t-main">
        <div class="t-title">${esc(p.name)}　${esc(b.name)}　${esc(r.floor)}・${esc(pr.name)}</div>
        <div class="t-sub"><span class="badge" style="background:${si.bg};color:${si.fg};padding:1px 7px;">${si.label} ${r.progress}%</span>${r.blockReason?'　⚠ '+esc(r.blockReason):''}${r.note?'　'+esc(r.note):''}</div>
      </div>
      <button class="btn btn-sm" onclick="editRecordFromHome('${p.id}','${r.id}')">更新</button>
    </div>`;
  }).join('') : '<div class="empty-mini">昨日更新的項目都已完成</div>';

  const delayHtml = delayItems.length ? delayItems.map(d=>`
    <div class="task-row">
      <div class="t-main">
        <div class="t-title">${esc(d.proj.name)}　${esc(d.b.name)}　${esc(d.floor)}・${esc(d.pr.name)}</div>
        <div class="t-sub">${d.type==='schedule' ? '預定完成日已過：'+esc(d.endDate) : (d.note?esc(d.note):'已標記延誤')}</div>
      </div>
      ${d.type==='record'
        ? `<button class="btn btn-sm" onclick="editRecordFromHome('${d.proj.id}','${d.recordId}')">更新</button>`
        : `<button class="btn btn-sm btn-primary" onclick="reportFromSchedule('${d.proj.id}','${d.scheduleId}')">回報進度</button>`}
    </div>`).join('') : '<div class="empty-mini">目前沒有延誤項目</div>';

  return `
  <div class="home-card report-panel">
    <h4>今日回報模式 <span class="hint" style="font-weight:400;">（${today}）點各筆按鈕可直接更新進度、狀態、備註與照片</span></h4>
    <div class="report-group"><h5>① 今日預定施作項目 <span class="cnt-pill">${todayItems.length}</span></h5>${todayHtml}</div>
    <div class="report-group"><h5>② 昨日未完成項目 <span class="cnt-pill">${yestItems.length}</span></h5>${yestHtml}</div>
    <div class="report-group"><h5>③ 延誤項目 <span class="cnt-pill ${delayItems.length?'warn':''}">${delayItems.length}</span></h5>${delayHtml}</div>
  </div>`;
}

function renderHome(){
  const projects = state.projects;
  // 今日待辦（跨所有案場）
  const todayTasks = [];
  projects.forEach(p=> projectTodayTasks(p).forEach(t=>todayTasks.push(t)) );
  todayTasks.sort((a,c)=>a.endDate.localeCompare(c.endDate));
  // 延誤項目（跨所有案場）
  const delays = [];
  projects.forEach(p=> projectDelayItems(p).forEach(d=>delays.push(d)) );
  delays.sort((a,c)=>c.updatedAt-a.updatedAt);
  // 最近更新（跨所有案場）
  const recent = [];
  projects.forEach(p=> p.records.forEach(r=> recent.push({p,r})) );
  recent.sort((a,c)=>c.r.updatedAt-a.r.updatedAt);
  const recentTop = recent.slice(0,8);

  const todayHtml = todayTasks.length ? todayTasks.slice(0,8).map(t=>`
    <div class="task-row" onclick="goToSite('${t.proj.id}')">

    </div>`).join('') : '<div class="empty-mini">今天沒有排定中的工項，太好了！</div>';

  const delayHtml = delays.length ? delays.slice(0,8).map(d=>`
    <div class="task-row" onclick="goToSite('${d.proj.id}')">
      <div class="t-main">
        <div class="t-title">${esc(d.proj.name)}　${esc(d.b.name)}　${esc(d.floor)}・${esc(d.pr.name)}</div>
        <div class="t-sub">${d.type==='schedule' ? '預定完成日已過：'+esc(d.endDate) : (d.note?esc(d.note):'已標記延誤')}</div>
      </div>
      <span class="badge" style="background:${STATUS.delayed.bg};color:${STATUS.delayed.fg};"><span class="dot" style="background:${STATUS.delayed.dot};"></span>延誤</span>
    </div>`).join('') : '<div class="empty-mini">目前沒有延誤項目</div>';

  const siteHtml = projects.length ? projects.map(p=>{

function renderHandover(proj){
  // 本週必追：需追蹤狀態的記錄（含卡點）
  const followRecs = proj.records
    .filter(r=> FOLLOW_STATUSES.includes(r.status) || (r.blockReason && r.status!=='done'))
    .sort((a,c)=>{ const ai=FOLLOW_STATUSES.indexOf(a.status), ci=FOLLOW_STATUSES.indexOf(c.status); return (ci===-1?-1:ci) - (ai===-1?-1:ai) || c.updatedAt-a.updatedAt; });
  // 卡點／待確認：有卡點原因或狀態為待確認者
  const blockedRecs = proj.records.filter(r=> r.status!=='done' && (r.blockReason || r.status==='pending_confirm'));
  // 待請款：狀態為待請款的記錄
  const billingRecs = proj.records.filter(r=> r.status==='waiting_billing');

  const recRow = (r)=>{
    const b = proj.buildings.find(x=>x.id===r.buildingId); const pr = proj.processes.find(x=>x.id===r.processId);

      </div>

  return `
    <div style="display:flex;justify-content:flex-end;margin-bottom:12px;">
      <button class="btn" onclick="openHandoverEditModal()">${ICO.edit} 編輯交接資料</button>

      <h4>① 現況摘要</h4>
      ${proj.handoverSummary ? `<p class="ho-summary">${esc(proj.handoverSummary)}</p>` : '<div class="empty-mini">尚未填寫，可點右上「編輯交接資料」補充</div>'}
    </div>
    <div class="home-grid">
      <div class="home-card"><h4>② 本週必追 <span class="cnt-pill ${followRecs.length?'warn':''}">${followRecs.length}</span></h4>${listOrEmpty(followRecs.slice(0,15),'目前沒有需追蹤項目')}</div>
      <div class="home-card"><h4>③ 卡點／待確認 <span class="cnt-pill ${blockedRecs.length?'warn':''}">${blockedRecs.length}</span></h4>${listOrEmpty(blockedRecs.slice(0,15),'目前沒有卡點項目')}</div>
    </div>
    <div class="home-card" style="margin-bottom:14px;">
      <h4>④ 待請款 <span class="cnt-pill">${billingRecs.length + proj.billingItems.length}</span></h4>
      ${proj.billingItems.length ? `<div class="ho-sub-label">請款事項／規則</div>${simpleList(proj.billingItems,'')}` : ''}
      ${billingRecs.length ? `<div class="ho-sub-label" style="margin-top:8px;">待請款工項</div>${billingRecs.map(recRow).join('')}` : (proj.billingItems.length?'':'<div class="empty-mini">目前沒有待請款項目</div>')}

    <div class="home-grid">
      <div class="home-card"><h4>⑤ 聯絡人</h4>${simpleList(proj.contacts,'尚未填寫聯絡人')}</div>

    </div>

      <h4>⑦ 置料區／進場須知</h4>
      <div class="ho-sub-label">置料區</div>

function renderBuildingBoard(proj){
  if(proj.buildings.length===0){
    return `<div class="empty-state"><h3>尚未建立棟別</h3><p>請先新增此案場的棟別（如 AB棟、CD棟）。</p>
      <button class="btn btn-primary" onclick="openAddBuildingModal()">${ICO.plus} 新增棟別</button></div>`;
  }
  const cards = proj.buildings.map(b=>{
    const avg = buildingOverallAvg(proj,b);
    const procAvgs = buildingProcessAverages(proj,b).filter(x=>x.avg>0 && x.avg<100);
    // 找目前「主要進行中」的工序：取平均值最高但未達100%者
    let current = null;
    if(procAvgs.length){ current = [...procAvgs].sort((a,c)=>c.avg-a.avg)[0]; }
    const delayCount = proj.records.filter(r=>r.buildingId===b.id && r.status==='delayed').length
      + proj.schedules.filter(s=>s.buildingId===b.id && !s.actualCompleteDate && s.endDate<todayStr()).length;
    return `
    <div class="bboard-card">
      <h4>${esc(b.name)}</h4>
      <div class="floors-sub">${b.floors.length} 樓層（${esc(b.floors[b.floors.length-1])} ～ ${esc(b.floors[0])}）</div>
      <div class="bboard-big">${avg}<span style="font-size:15px;">%</span></div>
      <div class="progress-bar" style="margin-top:8px;"><div style="width:${avg}%;"></div></div>
      <div class="bboard-current">
        <div class="lbl">目前主要工序</div>
        <div class="val">${current ? esc(current.process.name)+'　'+current.avg+'%' : '無施作中工序'}</div>
      </div>
      ${delayCount>0 ? `<div style="margin-top:8px;"><span class="badge" style="background:${STATUS.delayed.bg};color:${STATUS.delayed.fg};"><span class="dot" style="background:${STATUS.delayed.dot};"></span>${delayCount} 項延誤</span></div>` : ''}
      <div class="bboard-actions">
        <button class="btn btn-sm" style="flex:1;" onclick="selectBuilding('${b.id}');setView('matrix')">${ICO.grid} 查看矩陣</button>
        <button class="btn btn-sm btn-primary" style="flex:1;" onclick="openQuickAddModal('${b.id}')">${ICO.plus} 新增進度</button>
      </div>
    </div>`;
  }).join('');
  return `<div class="building-board">${cards}</div>
    <div style="margin-top:16px;"><button class="btn" onclick="openAddBuildingModal()">${ICO.plus} 新增棟別</button></div>`;
}


/* =====================  8b. 實際進度表（位置 × 樓層 × 工項）  ===================== */
const ACTUAL_DEFAULT_PART_GROUPS = [
  {name:'背中庭向', parts:['B4角柱','B3柱','B2柱','B1柱','A1柱','A2柱','A3柱','A4角柱','A1側柱','A2側柱','A3側柱','A4側柱']},
  {name:'中庭向', parts:['B5角柱','B6柱','B7柱','B8柱','A8柱','A7柱','A6柱','A5角柱']},
  {name:'18F以上', parts:['B1側柱','B2側柱','B3側柱','B4側柱']},
];
const ACTUAL_DEFAULT_SECTIONS = [
  {key:'frame', label:'骨架安裝'},
  {key:'panel', label:'包板安裝'},
];
const ACTUAL_STATUS = {
  blank: {label:'空白', cls:'actual-blank', color:'#FFFFFF', text:''},
  slash: {label:'斜線', cls:'actual-slash', color:'#FFFFFF', text:''},
  layout_done: {label:'吊線完成', cls:'actual-layout-done', color:'#C9CED6', text:'吊線'},
  frame_material: {label:'骨架到料', cls:'actual-frame-material', color:'#D8ECFF', text:'骨料'},
  frame_install: {label:'骨架安裝', cls:'actual-frame-install', color:'#87BFF1', text:'安裝'},
  frame_done: {label:'骨架完成', cls:'actual-frame-done', color:'#2F7FC1', text:'完成'},
  frame_survey: {label:'骨架收測', cls:'actual-frame-survey', color:'#0F3F75', text:'收測'},
  panel_cutting: {label:'包板下料', cls:'actual-panel-cutting', color:'#FFE3B8', text:'下料'},
  panel_install: {label:'包板安裝中', cls:'actual-panel-install', color:'#F5B15C', text:'安裝'},
  panel_done: {label:'包板施作完成', cls:'actual-panel-done', color:'#C85B16', text:'完成'},
  silicone: {label:'矽膠施打', cls:'actual-silicone', color:'#42B883', text:'矽膠'},
  repair: {label:'修復／更換', cls:'actual-repair', color:'#8B5CF6', text:'修復'},
  clean: {label:'清潔', cls:'actual-clean', color:'#2F855A', text:'清潔'},
  delayed: {label:'延誤', cls:'actual-delayed', color:'#C4392F', text:'延誤'},
};
const ACTUAL_STATUS_ORDER = ['blank','slash','layout_done','frame_material','frame_install','frame_done','frame_survey','panel_cutting','panel_install','panel_done','silicone','repair','clean','delayed'];
const ACTUAL_PROCESS_BY_STATUS = {
  layout_done:'吊線完成', frame_material:'骨架到料', frame_install:'骨架安裝', frame_done:'骨架完成', frame_survey:'骨架收測',
  panel_cutting:'包板下料', panel_install:'包板安裝中', panel_done:'包板施作完成', silicone:'矽膠施打', repair:'修復／更換', clean:'清潔', delayed:'延誤'
};
let actualDrag = null;
let suppressActualClick = false;

function normalizePartName(name){ return String(name||'').replace(/\s+/g,'').replace(/[()（）]/g,''); }
function cloneActualGroups(){ return ACTUAL_DEFAULT_PART_GROUPS.map(g=>({name:g.name, parts:[...g.parts]})); }
function cloneActualSections(){ return ACTUAL_DEFAULT_SECTIONS.map(s=>({...s})); }
function ensureActualProgressSetup(proj){
  let changed = false;
  if(!proj.actualTable || typeof proj.actualTable!=='object'){
    proj.actualTable = {partGroups:cloneActualGroups(), sections:cloneActualSections(), cells:{}};
    changed = true;
  }
  if(!Array.isArray(proj.actualTable.partGroups) || !proj.actualTable.partGroups.length){ proj.actualTable.partGroups = cloneActualGroups(); changed=true; }
  if(!Array.isArray(proj.actualTable.sections) || !proj.actualTable.sections.length){ proj.actualTable.sections = cloneActualSections(); changed=true; }
  if(!proj.actualTable.cells || typeof proj.actualTable.cells!=='object'){ proj.actualTable.cells = {}; changed=true; }
  // 與既有快速新增／編輯視窗相容：讓位置與工序可被選到
  proj.actualTable.partGroups.flatMap(g=>g.parts||[]).forEach(name=>{
    if(name && !proj.parts.some(p=>normalizePartName(p.name)===normalizePartName(name))){ proj.parts.push({id:uid('pt'), name}); changed=true; }
  });
  Object.values(ACTUAL_PROCESS_BY_STATUS).forEach(name=>{
    if(name && !proj.processes.some(p=>p.name===name)){ proj.processes.push({id:uid('pr'), name, groupId:null}); changed=true; }
  });
  if(changed) scheduleSave();
}
function actualPartId(proj, partName){
  const p = proj.parts.find(x=>normalizePartName(x.name)===normalizePartName(partName));
  return p ? p.id : null;
}
function actualKey(buildingId, sectionKey, floor, partName){ return [buildingId, sectionKey, floor, partName].map(x=>String(x??'')).join('||'); }
function actualProcessIdForStatus(proj, statusKey){
  const name = ACTUAL_PROCESS_BY_STATUS[statusKey] || ACTUAL_STATUS[statusKey]?.label || '實際進度';
  let pr = proj.processes.find(p=>p.name===name);
  if(!pr){ pr = {id:uid('pr'), name, groupId:null}; proj.processes.push(pr); }
  return pr.id;
}
function actualStatusFromRecord(proj, buildingId, floor, partName, sectionKey){
  const pid = actualPartId(proj, partName);
  const processNameById = new Map(proj.processes.map(p=>[p.id,p.name]));
  const targetNames = Object.values(ACTUAL_PROCESS_BY_STATUS);
  const recs = proj.records.filter(r=> r.buildingId===buildingId && r.floor===floor && targetNames.includes(processNameById.get(r.processId)) && (!r.partIds || r.partIds.length===0 || (pid && r.partIds.includes(pid))) );
  if(recs.some(r=>r.status==='delayed' || processNameById.get(r.processId)==='延誤')) return {status:'delayed', note:''};
  // 依工序前後優先顯示後段成果
  const priority = ['clean','repair','silicone','panel_done','panel_install','panel_cutting','frame_survey','frame_done','frame_install','frame_material','layout_done'];
  for(const st of priority){
    const name = ACTUAL_PROCESS_BY_STATUS[st];
    const hit = recs.find(r=>processNameById.get(r.processId)===name && (r.status==='done' || r.status==='in_progress' || Number(r.progress)>0));
    if(hit) return {status:st, note:hit.note||'', recordId:hit.id};
  }
  return {status:'blank', note:''};
}
function actualCellData(proj, buildingId, sectionKey, floor, partName){
  ensureActualProgressSetup(proj);
  const k = actualKey(buildingId, sectionKey, floor, partName);
  return proj.actualTable.cells[k] || actualStatusFromRecord(proj, buildingId, floor, partName, sectionKey);
}
function actualCellPresentation(data){
  const st = ACTUAL_STATUS[data?.status || 'blank'] || ACTUAL_STATUS.blank;
  return {cls:st.cls, label:st.label, text:data?.status==='blank' || data?.status==='slash' ? '' : (data?.text || st.text)};
}
function actualFloorsForSection(proj, b, key){
  // 以該棟 floors 為主，可由「表格設定」改列名；不再硬切樓層，避免實際表格與現場表不一致。
  return (b.floors||[]).filter(fl=>fl!=='全區');
}
function actualDisplayName(name){ return name==='' ? '' : String(name); }
function actualHeaderGroups(proj){ ensureActualProgressSetup(proj); return proj.actualTable.partGroups; }
function actualSections(proj){ ensureActualProgressSetup(proj); return proj.actualTable.sections; }
function actualParts(proj){ return actualHeaderGroups(proj).flatMap(g=>g.parts||[]); }
function renderActualHeader(proj){
  const groups = actualHeaderGroups(proj);
  return `<thead>
    <tr><th class="actual-stage-col"></th><th class="actual-floor-col"></th>${groups.map(g=>`<th class="actual-group-head" colspan="${(g.parts||[]).length||1}">${esc(actualDisplayName(g.name))}</th>`).join('')}</tr>
    <tr><th class="actual-stage-col"></th><th class="actual-floor-col">樓層</th>${groups.flatMap(g=>g.parts||['']).map(p=>`<th class="actual-part-head ${p===''?'actual-empty-name':''}">${esc(actualDisplayName(p))}</th>`).join('')}</tr>
  </thead>`;
}
function renderActualSection(proj, b, section){
  const floors = actualFloorsForSection(proj, b, section.key);
  const parts = actualParts(proj);
  if(!floors.length) return '';
  return floors.map((fl, idx)=>{
    const stageCell = idx===0 ? `<td class="actual-section-label" rowspan="${floors.length}">${esc(section.label)}</td>` : '';
    const cells = parts.map((part, partIndex)=>{
      const data = actualCellData(proj, b.id, section.key, fl, part);
      const st = actualCellPresentation(data);
      const title = `${b.name} ${fl||'空白列'} ${part||'空白欄'}｜${section.label}｜${st.label}${data.note?'｜'+data.note:''}`;
      return `<td class="actual-cell ${st.cls}" data-b="${esc(b.id)}" data-sec="${esc(section.key)}" data-fl="${esc(fl)}" data-part="${esc(part)}" data-part-index="${partIndex}" title="${esc(title)}" onmousedown="actualDragStart(event,this)" onmouseenter="actualDragEnter(event,this)" onclick="actualCellClick(event,this)"><span class="actual-pct">${esc(st.text)}</span></td>`;
    }).join('');
    return `<tr>${stageCell}<td class="actual-floor ${fl===''?'actual-empty-name':''}">${esc(fl)}</td>${cells}</tr>`;
  }).join('');
}
function renderActualLegend(){
  return ACTUAL_STATUS_ORDER.filter(k=>k!=='blank'&&k!=='slash').map(k=>{
    const st=ACTUAL_STATUS[k];
    return `<span><span class="sw" style="background:${st.color}"></span>${esc(st.label)}</span>`;
  }).join('') + `<span><span class="sw" style="background:#fff"></span>空白</span><span><span class="sw" style="background:linear-gradient(to bottom right, transparent 45%, #111 47%, #111 53%, transparent 55%)"></span>斜線</span>`;
}
function renderActualProgress(proj){
  ensureActualProgressSetup(proj);
  const b = currentBuilding();
  if(!b){

function clearActualSelection(){ document.querySelectorAll('.actual-cell.actual-selected').forEach(td=>td.classList.remove('actual-selected')); }
function actualCellsBetween(start, end){
  if(!start || !end || start.buildingId!==end.buildingId || start.sectionKey!==end.sectionKey) return [];
  const proj=currentProject(); const b=currentBuilding(); if(!proj||!b) return [];
  const floors=actualFloorsForSection(proj,b,start.sectionKey); const parts=actualParts(proj);
  const fi1=floors.indexOf(start.floor), fi2=floors.indexOf(end.floor);
  const pi1=start.partIndex, pi2=end.partIndex;
  if(fi1<0 || fi2<0) return [];
  const fMin=Math.min(fi1,fi2), fMax=Math.max(fi1,fi2), pMin=Math.min(pi1,pi2), pMax=Math.max(pi1,pi2);
  const out=[];
  for(let fi=fMin; fi<=fMax; fi++) for(let pi=pMin; pi<=pMax; pi++) out.push({buildingId:start.buildingId, sectionKey:start.sectionKey, floor:floors[fi], part:parts[pi], partIndex:pi});
  return out;
}

/* ---------- 全棟模式：棟別摘要、自動提示、篩選、渲染 ---------- */
function buildingSummary(proj, b){
  const avgs = buildingProcessAverages(proj, b);
  const overall = avgs.length ? Math.round(avgs.reduce((s,x)=>s+x.avg,0)/avgs.length) : 0;
  const recs = proj.records.filter(r=>r.buildingId===b.id);
  const delayedCount = recs.filter(r=>r.status==='delayed').length
    + proj.schedules.filter(s=>s.buildingId===b.id && !s.actualCompleteDate && fromDateStr(s.endDate)<fromDateStr(todayStr())).length;
  const waitingCount = recs.filter(r=>r.status==='waiting_material').length;
  const lastUpdate = recs.length ? Math.max(...recs.map(r=>r.updatedAt)) : null;
  // 目前主要工序：進行中(0<avg<100)工序裡順序最後面的（進度最前緣）；否則判斷全完成/未開始
  const inProg = avgs.filter(x=>x.avg>0 && x.avg<100);
  let mainProcess;
  if(inProg.length) mainProcess = inProg[inProg.length-1].process.name + '（'+inProg[inProg.length-1].avg+'%）';
  else if(avgs.length && avgs.every(x=>x.avg>=100)) mainProcess = '全部完成';
  else {
    let lastDoneIdx=-1; avgs.forEach((x,i)=>{ if(x.avg>=100) lastDoneIdx=i; });
    mainProcess = lastDoneIdx>=0 ? avgs[lastDoneIdx].process.name+' 已完成' : '尚未開始';
  }
  return { overall, mainProcess, delayedCount, waitingCount, lastUpdate, avgs };
}
function shortFloorLabel(b, floors){
  const label = compressFloorLabel(b, floors);

// 自動產生「落後提醒」與「接續施工提示」
function buildingSuggestions(proj, b){
  const out = [];
  const { avgs } = buildingSummary(proj, b);
  // 待料追蹤
  const waitingRecs = proj.records.filter(r=>r.buildingId===b.id && r.status==='waiting_material');
  if(waitingRecs.length){
    const prNames = [...new Set(waitingRecs.map(r=>{const p=proj.processes.find(x=>x.id===r.processId);return p?p.name:null;}).filter(Boolean))];
    out.push({type:'warn', text:`${b.name} 目前待${prNames.join('、')}，需追蹤材料預定到場日。`});
  }
  // 延誤警示
  const delayedRecs = proj.records.filter(r=>r.buildingId===b.id && r.status==='delayed');
  const overdue = proj.schedules.filter(s=>s.buildingId===b.id && !s.actualCompleteDate && fromDateStr(s.endDate)<fromDateStr(todayStr()));
  if(delayedRecs.length + overdue.length){
    const detail = overdue.slice(0,2).map(s=>{const p=proj.processes.find(x=>x.id===s.processId);return (p?p.name:'')+' '+shortFloorLabel(b,s.floors)+'（原定'+s.endDate+'完成）';}).join('；');
    out.push({type:'alert', text:`${b.name} 有 ${delayedRecs.length+overdue.length} 項延誤／逾期${detail?'：'+detail:''}，請優先處理。`});
  }
  // 接續施工提示：以進度最前緣的進行中工序為主
  const inProg = avgs.filter(x=>x.avg>0 && x.avg<100);
  if(inProg.length){
    const front = inProg[inProg.length-1];
    const remainFloors = b.floors.filter(fl=>cellBucket(getRecords(proj.id,b.id,fl,front.process.id)).avg<100);
    out.push({type:'next', text:`${b.name} ${front.process.name} 進度最前（${front.avg}%），可接續往 ${shortFloorLabel(b,remainFloors)} 安排施作。`});
  } else {
    let lastDoneIdx=-1; avgs.forEach((x,i)=>{ if(x.avg>=100) lastDoneIdx=i; });
    if(lastDoneIdx>=0 && lastDoneIdx<avgs.length-1){
      out.push({type:'next', text:`${b.name} 已完成${avgs[lastDoneIdx].process.name}，下一步應進入${avgs[lastDoneIdx+1].process.name}。`});
    } else if(avgs.length && lastDoneIdx===avgs.length-1){
      out.push({type:'ok', text:`${b.name} 所有工序均已完成。`});
    }
  }
  return out;
}

// 依篩選條件計算某棟要顯示的樓層與工序
function applyAllFilter(proj, b){
  const f = getAllFilter();
  let processes = proj.processes;
  if(f.process) processes = processes.filter(pr=>pr.id===f.process);
  let floors = [...b.floors];
  // 樓層範圍（依該棟樓層順序取區間，輸入單邊也可）
  if(f.floorFrom || f.floorTo){
    const i1 = f.floorFrom ? b.floors.indexOf(f.floorFrom.trim().toUpperCase()) : -1;
    const i2 = f.floorTo ? b.floors.indexOf(f.floorTo.trim().toUpperCase()) : -1;
    if(i1>=0 && i2>=0){ const lo=Math.min(i1,i2), hi=Math.max(i1,i2); floors = b.floors.slice(lo,hi+1); }
    else if(i1>=0) floors = [b.floors[i1]];
    else if(i2>=0) floors = [b.floors[i2]];
    // 若該棟找不到指定樓層，維持全部（避免誤把整棟隱藏）
  }
  const tokens = f.kw.trim().toLowerCase().split(/\s+/).filter(Boolean);
  // 狀態／關鍵字：保留至少有一格符合的樓層
  if(f.status || tokens.length){
    floors = floors.filter(fl=>{
      return processes.some(pr=>{
        const recs = getRecords(proj.id, b.id, fl, pr.id);
        const statusOk = !f.status || recs.some(r=>r.status===f.status);
        if(!statusOk) return false;
        if(!tokens.length) return true;
        const hay = [b.name, fl, pr.name, ...recs.map(r=>(r.note||'')+' '+(r.crew||''))].join(' ').toLowerCase();
        return tokens.every(t=>hay.includes(t));
      });
    });
  }
  return { processes, floors };
}

function renderMatrixAll(proj){
  if(proj.buildings.length===0){
    return `<div class="empty-state"><h3>尚未建立棟別</h3><button class="btn btn-primary" onclick="openAddBuildingModal()">${ICO.plus} 新增棟別</button></div>`;
  }
  const f = getAllFilter();
  const shownBuildings = f.building ? proj.buildings.filter(b=>b.id===f.building) : proj.buildings;

  // 落後提醒與接續施工提示（不受棟別篩選影響，永遠顯示全棟）
  const allSuggestions = proj.buildings.flatMap(b=>buildingSuggestions(proj,b));
  const suggPanel = allSuggestions.length ? `
    <div class="suggest-panel">
      <h4>落後提醒與接續施工提示</h4>
      ${allSuggestions.map(s=>`<div class="suggest-item s-${s.type}"><span class="si-dot"></span><span>${esc(s.text)}</span></div>`).join('')}
    </div>` : '';

  // 跨棟比較列
  const compareCards = proj.buildings.map(b=>{
    const s = buildingSummary(proj,b);
    return `<div class="compare-card ${f.building===b.id?'filtered':''}" onclick="toggleCompareFilter('${b.id}')" title="點擊可僅檢視此棟">
      <div class="cc-name">${esc(b.name)}<span class="cc-pct">${s.overall}%</span></div>

    </div>`;

/* =====================  10. 甘特圖／預定工程進度表  ===================== */
const GT_DAY_WIDTH = 34, GT_LABEL_WIDTH = 160;
function getScheduleWindow(proj){
  // 若使用者手動設定顯示範圍則優先採用
  const gr = state.ganttRange;
  if(gr && gr.start && gr.end){
    let s = fromDateStr(gr.start), e = fromDateStr(gr.end);
    if(e < s){ const t=s; s=e; e=t; }
    return {start:s, end:e, manual:true};
  }
  const today = new Date(); today.setHours(0,0,0,0);
  let start = addDays(today,-7), end = addDays(today,90);
  proj.schedules.forEach(s=>{ const sd=fromDateStr(s.startDate), ed=fromDateStr(s.endDate); if(sd<start) start=sd; if(ed>end) end=ed; });
  return {start,end,manual:false};
}
// 甘特圖顯示範圍控制
function setGanttRange(which, val){
  if(!state.ganttRange) state.ganttRange = {start:'', end:''};
  state.ganttRange[which] = val;
  // 兩端都有值才生效；只填一端時以自動範圍的另一端補齊
  if(state.ganttRange.start && !state.ganttRange.end){
    const proj = currentProject(); const auto = (()=>{ const t=new Date(); t.setHours(0,0,0,0); let s=addDays(t,-7),e=addDays(t,90); proj.schedules.forEach(x=>{const sd=fromDateStr(x.startDate),ed=fromDateStr(x.endDate); if(sd<s)s=sd; if(ed>e)e=ed;}); return e; })();
    state.ganttRange.end = toDateStr(auto);
  }
  if(state.ganttRange.end && !state.ganttRange.start){
    const t=new Date(); t.setHours(0,0,0,0);
    state.ganttRange.start = toDateStr(addDays(t,-7));
  }
  scheduleSave(); render();
}
function shiftGanttRange(edge, deltaDays){
  const proj = currentProject();
  const {start,end} = getScheduleWindow(proj);
  if(!state.ganttRange) state.ganttRange = {start:'', end:''};
  if(edge==='start') state.ganttRange.start = toDateStr(addDays(start, deltaDays));
  else state.ganttRange.end = toDateStr(addDays(end, deltaDays));
  if(!state.ganttRange.start) state.ganttRange.start = toDateStr(start);
  if(!state.ganttRange.end) state.ganttRange.end = toDateStr(end);
  // 防止範圍縮到反轉
  if(fromDateStr(state.ganttRange.end) < fromDateStr(state.ganttRange.start)){
    state.ganttRange.end = state.ganttRange.start;
  }
  scheduleSave(); render();
}
function resetGanttRange(){ state.ganttRange = {start:'', end:''}; scheduleSave(); render(); }
function renderGanttRangeBar(proj){
  const {start,end,manual} = getScheduleWindow(proj);
  return `
  <div class="gantt-range-bar">
    <span class="grb-label">顯示日期範圍</span>
    <button type="button" class="btn btn-sm" onclick="shiftGanttRange('start',-30)" title="往前增加30天">◀ +30天</button>
    <button type="button" class="btn btn-sm" onclick="shiftGanttRange('start',30)" title="開頭往後縮短30天">▶ −30天</button>
    <input type="date" value="${toDateStr(start)}" onchange="setGanttRange('start',this.value)">
    <span>～</span>
    <input type="date" value="${toDateStr(end)}" onchange="setGanttRange('end',this.value)">
    <button type="button" class="btn btn-sm" onclick="shiftGanttRange('end',-30)" title="結尾往前縮短30天">◀ −30天</button>
    <button type="button" class="btn btn-sm" onclick="shiftGanttRange('end',30)" title="往後增加30天">+30天 ▶</button>
    ${manual ? `<button type="button" class="btn btn-sm" onclick="resetGanttRange()">回復自動範圍</button>` : `<span class="hint" style="margin:0;">（自動：涵蓋全部排程）</span>`}
  </div>`;
}
// 將排程日期裁切至顯示視窗；完全在視窗外回傳null
function clipToWindow(sd, ed, winStart, winEnd){
  if(ed < winStart || sd > winEnd) return null;
  const cs = sd < winStart ? winStart : sd;
  const ce = ed > winEnd ? winEnd : ed;
  return { colStart: 2+diffDays(winStart, cs), span: Math.max(1, diffDays(cs, ce)+1) };
}
function dateRangeArray(start,end){ const arr=[]; let d=new Date(start); while(d<=end){ arr.push(new Date(d)); d=addDays(d,1); } return arr; }
function buildGanttDisplayRows(proj, opts){
  // 建立「大項目→子項目」的顯示順序；未分組的工序維持原本單一列顯示
  // opts.expandAll=true 時（PDF匯出）全部展開；否則依 formState.ganttExpanded 決定
  // opts.keyPrefix 用於全棟模式下區分「同一分組在不同棟」的展開狀態
  opts = opts || {};
  if(!formState.ganttExpanded) formState.ganttExpanded = {};
  const rows = [];
  const grouped = new Set();
  proj.processGroups.forEach(g=>{
    const members = proj.processes.filter(pr=>pr.groupId===g.id);
    if(members.length===0) return; // 分組底下沒有工項時不顯示空的分組列
    members.forEach(pr=>grouped.add(pr.id));
    const expandKey = (opts.keyPrefix||'')+g.id;
    const expanded = opts.expandAll || !!formState.ganttExpanded[expandKey];
    rows.push({type:'group', group:g, expandKey, expanded});
    if(expanded) members.forEach(pr=>{ rows.push({type:'process', process:pr, indented:true}); });
  });
  proj.processes.forEach(pr=>{ if(!grouped.has(pr.id)) rows.push({type:'process', process:pr, indented:false}); });
  return rows;
}
function toggleGanttGroup(expandKey){
  if(!formState.ganttExpanded) formState.ganttExpanded = {};
  formState.ganttExpanded[expandKey] = !formState.ganttExpanded[expandKey];
  render();
}
// 大項目摘要：底下細項的總日期範圍與平均完成率
function groupSummaryInfo(proj, b, group){
  const memberIds = new Set(proj.processes.filter(pr=>pr.groupId===group.id).map(pr=>pr.id));
  const scheds = proj.schedules.filter(s=>s.buildingId===b.id && memberIds.has(s.processId));
  let range = null;
  if(scheds.length){
    const minStart = scheds.reduce((m,s)=>{const d=fromDateStr(s.startDate);return d<m?d:m;}, fromDateStr(scheds[0].startDate));
    const maxEnd = scheds.reduce((m,s)=>{const d=fromDateStr(s.actualCompleteDate||s.endDate);return d>m?d:m;}, fromDateStr(scheds[0].actualCompleteDate||scheds[0].endDate));
    range = {minStart, maxEnd};
  }
  const memberAvgs = buildingProcessAverages(proj, b).filter(x=>memberIds.has(x.process.id));
  const avg = memberAvgs.length ? Math.round(memberAvgs.reduce((s,x)=>s+x.avg,0)/memberAvgs.length) : 0;
  return { range, avg };
}
function fmtShortDate(d){ return (d.getMonth()+1)+'/'+d.getDate(); }
function scheduleLabel(proj, b, s){
  const pr = proj.processes.find(x=>x.id===s.processId);
  return `${pr?pr.name:'(未知工序)'} ${compressFloorLabel(b, s.floors)}（${s.startDate}～${s.endDate}）`;
}
function renderScheduleAll(proj){

  const rowsHtml = displayRows.map((row,ri)=>{

        const clip = clipToWindow(minStart, maxEnd, start, end);
        if(clip) bar = `<div class="gt-building-bar" style="grid-column:${clip.colStart} / span ${clip.span};grid-row:${gridRow};" title="${esc(b.name)}　${toDateStr(minStart)}～${toDateStr(maxEnd)}"></div>`;

      const label = `<div class="gt-group-header gt-clickable" style="grid-column:1;grid-row:${gridRow};padding-left:22px;" onclick="toggleGanttGroup('${row.expandKey}')" title="點擊${row.expanded?'收合':'展開'}細項　${esc(b.name)}　${esc(row.group.name)}　${rangeText}　平均 ${info.avg}%">

      </div>`;
      const trackCells = days.map((d,i)=>{
        const isWeekend = d.getDay()===0||d.getDay()===6;
        return `<div class="gt-day-cell gt-group-track ${isWeekend?'gt-weekend':''}" style="grid-column:${i+2};grid-row:${gridRow};" onclick="toggleGanttGroup('${row.expandKey}')"></div>`;
      }).join('');
      let summaryBar='';
      if(info.range){
        const clip = clipToWindow(info.range.minStart, info.range.maxEnd, start, end);
        if(clip) summaryBar = `<div class="gt-group-bar" style="grid-column:${clip.colStart} / span ${clip.span};grid-row:${gridRow};pointer-events:none;" title="${esc(b.name)}　${esc(row.group.name)}　${toDateStr(info.range.minStart)}～${toDateStr(info.range.maxEnd)}　平均 ${info.avg}%"></div>`;
      }
      return label+trackCells+summaryBar;
    }
    const pr = row.process;
    const label = `<div class="gt-row-label ${row.indented?'gt-child-label':''}" style="grid-column:1;grid-row:${gridRow};${row.indented?'padding-left:40px;':'padding-left:22px;'}" title="${esc(b.name)}　${esc(pr.name)}">${esc(pr.name)}</div>`;
    const dayCells = days.map((d,i)=>{
      const isWeekend = d.getDay()===0||d.getDay()===6;
      return `<div class="gt-day-cell ${isWeekend?'gt-weekend':''}" style="grid-column:${i+2};grid-row:${gridRow};" ondblclick="openScheduleCreateModal('${b.id}','${pr.id}','${toDateStr(d)}')"></div>`;
    }).join('');
    const bars = proj.schedules.filter(s=>s.buildingId===b.id && s.processId===pr.id).map(s=>{
      const sd=fromDateStr(s.startDate), ed=fromDateStr(s.endDate);
      const clip = clipToWindow(sd, ed, start, end);
      if(!clip) return ''; // 排程完全在顯示範圍之外
      const floorLabel = compressFloorLabel(b, s.floors);
      const isLate = !s.actualCompleteDate && ed < fromDateStr(todayS);
      const isDone = !!s.actualCompleteDate;
      const cls = isDone ? 'gt-done' : (isLate ? 'gt-late' : '');
      const hasDep = (s.dependsOn||[]).length>0;
      return `<div class="gt-bar ${cls} ${hasDep?'gt-has-dep':''}" data-sid="${s.id}" style="grid-column:${clip.colStart} / span ${clip.span};grid-row:${gridRow};" title="${esc(b.name)}　${esc(pr.name)}　${esc(floorLabel)}　${esc(s.startDate)}～${esc(s.endDate)}">
        <div class="gt-bar-body" onclick="openScheduleEditModal('${s.id}')">${esc(floorLabel)}</div>
        <div class="gt-bar-handle" onmousedown="ganttResizeMouseDown(event,'${s.id}')"></div>

  return `

    </div>
    <div style="margin-top:14px;">
      <button class="btn" onclick="exportGanttPDF()">${ICO.printer} 匯出 PDF（全棟，各棟分頁）</button>
      <button class="btn" onclick="openSettingsModal('groups')">${ICO.gear} 管理大項目分組</button>

      if(info.range){
