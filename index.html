        if(clip) summaryBar = `<div class="gt-group-bar" style="grid-column:${clip.colStart} / span ${clip.span};grid-row:${gridRow};pointer-events:none;" title="${esc(row.group.name)}　${toDateStr(info.range.minStart)}～${toDateStr(info.range.maxEnd)}　平均 ${info.avg}%"></div>`;
      }
      return label+trackCells+summaryBar;
    }
    const pr = row.process;
    const label = `<div class="gt-row-label ${row.indented?'gt-child-label':''}" style="grid-column:1;grid-row:${gridRow};" title="${esc(pr.name)}">${esc(pr.name)}</div>`;
    const dayCells = days.map((d,i)=>{
      const isWeekend = d.getDay()===0||d.getDay()===6;
      return `<div class="gt-day-cell ${isWeekend?'gt-weekend':''}" style="grid-column:${i+2};grid-row:${gridRow};" ondblclick="openScheduleCreateModal('${b.id}','${pr.id}','${toDateStr(d)}')"></div>`;
    }).join('');
    const bars = proj.schedules.filter(s=>s.buildingId===b.id && s.processId===pr.id).map(s=>{
      const sd=fromDateStr(s.startDate), ed=fromDateStr(s.endDate);
      const clip = clipToWindow(sd, ed, start, end);
      if(!clip) return ''; // 排程完全在顯示範圍之外
      const floorLabel = compressFloorLabel(b, s.floors);
      const isLate = !s.actualCompleteDate && ed < fromDateStr(todayS);
      const isDone = !!s.actualCompleteDate;
      const cls = isDone ? 'gt-done' : (isLate ? 'gt-late' : '');
      const hasDep = (s.dependsOn||[]).length>0;
      const depNames = hasDep ? (s.dependsOn.map(depId=>{ const dep=proj.schedules.find(x=>x.id===depId); return dep?scheduleLabel(proj,b,dep):null; }).filter(Boolean).join('；')) : '';
      const tip = `${esc(pr.name)}　${esc(floorLabel)}　${esc(s.startDate)}～${esc(s.endDate)}${s.actualCompleteDate?'　實際完成:'+esc(s.actualCompleteDate):''}${s.note?'　'+esc(s.note):''}${hasDep?'　前置任務:'+esc(depNames):''}`;
      return `<div class="gt-bar ${cls} ${hasDep?'gt-has-dep':''}" data-sid="${s.id}" style="grid-column:${clip.colStart} / span ${clip.span};grid-row:${gridRow};" title="${tip}">
        <div class="gt-bar-body" onclick="openScheduleEditModal('${s.id}')">${esc(floorLabel)}</div>
        <div class="gt-bar-handle" onmousedown="ganttResizeMouseDown(event,'${s.id}')"></div>
      </div>`;
    }).join('');
    return label+dayCells+bars;
  }).join('');

  return `
    ${renderGanttRangeBar(proj)}
    <div class="gantt-scroll">
      <div class="gantt-grid" style="grid-template-columns:${GT_LABEL_WIDTH}px repeat(${days.length},${GT_DAY_WIDTH}px);grid-template-rows:40px repeat(${displayRows.length},44px);">
        <div class="gt-corner" style="grid-column:1;grid-row:1;">工序 ＼ 日期</div>
        ${headerCells}${rowsHtml}
      </div>
    </div>
    <div class="legend">
      <span><span class="legend-sw" style="background:var(--orange);"></span>預定施作中</span>
      <span><span class="legend-sw" style="background:var(--green);"></span>已填實際完成日</span>
      <span><span class="legend-sw" style="background:var(--red);"></span>已逾預定完成日尚未完成</span>
      <span><span class="legend-sw" style="background:var(--ink-mute);"></span>大項目彙總（依子項目日期自動計算）</span>
      <span style="color:var(--ink-faint);">雙擊子項目空白格建立排程；色塊左側有標記代表有前置任務；點擊色塊編輯／填實際完成日；拖曳右側把手調整預定完成日</span>
    </div>
    <div style="margin-top:14px;">
      <button class="btn" onclick="exportGanttPDF()">${ICO.printer} 匯出 PDF（A4橫向，日期自動分頁接續）</button>
      <button class="btn" onclick="openSettingsModal('groups')">${ICO.gear} 管理大項目分組</button>
    </div>`;
}
function refreshScheduleBarDOM(s){
  const proj = currentProject(); const {start} = getScheduleWindow(proj);
  const el = document.querySelector(`.gt-bar[data-sid="${cssEscape(s.id)}"]`); if(!el) return;
  const sd=fromDateStr(s.startDate), ed=fromDateStr(s.endDate);
  el.style.gridColumn = `${2+diffDays(start,sd)} / span ${Math.max(1,diffDays(sd,ed)+1)}`;
}

/* ---------- 匯出 PDF（A4橫向，日期超出單頁範圍時自動分頁，工序列於每頁重複，日期自上頁最後一天接續） ---------- */
const GANTT_PRINT_DAYS_PER_PAGE = 30; // 放大版面後，依 A4 橫向可印範圍重新抓的每頁天數
function buildGanttPrintHTML(proj, b){
  const { start, end } = getScheduleWindow(proj);
  const allDays = dateRangeArray(start, end);
  const dayPages = [];
  for(let i=0; i<allDays.length; i+=GANTT_PRINT_DAYS_PER_PAGE){ dayPages.push(allDays.slice(i, i+GANTT_PRINT_DAYS_PER_PAGE)); }
  if(dayPages.length===0) dayPages.push([]);

  // === 自適應版面計算：確保永遠不超出 A4 橫向可印範圍 ===
  // A4 橫向 297×210mm，扣 8mm 邊界 → 可印 281×194mm；再扣頁首列約 8mm
  const PAGE_W = 279, PAGE_H = 184; // 保守值，預留誤差
  const labelMm = 32;
  // 欄寬依「本組頁面實際天數」自適應：天數少時欄位自動加寬（上限 12mm）
  const maxDaysInPage = Math.max(1, ...dayPages.map(p=>p.length));
  const dayMm = Math.min(12, Math.floor(((PAGE_W - labelMm) / maxDaysInPage) * 10) / 10);
  // 列高依列數自適應：列多時自動壓縮（下限 5mm），仍放不下就垂直分頁
  const allRows = buildGanttDisplayRows(proj, {expandAll:true});
  const dateRowMm = 8;
  const availH = PAGE_H - dateRowMm;
  let rowMm = 9;
  if(allRows.length * rowMm > availH) rowMm = Math.max(5, Math.floor((availH / allRows.length) * 10) / 10);
  const maxRowsPerPage = Math.max(1, Math.floor(availH / rowMm));
  // 垂直分段：列數超過單頁容量時切成多段，每段重複日期表頭
  const rowChunks = [];
  for(let i=0; i<allRows.length; i+=maxRowsPerPage){ rowChunks.push(allRows.slice(i, i+maxRowsPerPage)); }
  if(rowChunks.length===0) rowChunks.push([]);
  // 字級隨列高縮放
  const labelFs = rowMm>=8 ? 9 : (rowMm>=6.5 ? 8 : 7);
  const barFs = rowMm>=8 ? 8 : (rowMm>=6.5 ? 7 : 6);
  const totalPages = dayPages.length * rowChunks.length;

  const pagesHtml = [];
  dayPages.forEach((days, dpIdx)=>{
    const pageStart = days[0], pageEnd = days[days.length-1];
    const colgroup = `<colgroup><col style="width:${labelMm}mm">${days.map(()=>`<col style="width:${dayMm}mm">`).join('')}</colgroup>`;
    const headRow = `<tr style="height:${dateRowMm}mm;">
      <th class="gp-corner">工序 ＼ 日期</th>
      ${days.map(d=>{
        const isWeekend = d.getDay()===0 || d.getDay()===6;
        const wd = ['日','一','二','三','四','五','六'][d.getDay()];
        return `<th class="gp-head-cell ${isWeekend?'gp-weekend':''}">${d.getMonth()+1}/${d.getDate()}<br>(${wd})</th>`;
      }).join('')}
    </tr>`;

    rowChunks.forEach((displayRows, rcIdx)=>{
      // 依「大項目→子項目」順序列出；每列用 colspan 合併出排程色塊，其餘為單日空白格，
      // 結構上不可能互相重疊（table 本身保證每格只會被佔用一次）
      const bodyRows = displayRows.map(row=>{
        if(row.type==='group'){
          const memberIds = new Set(proj.processes.filter(pr=>pr.groupId===row.group.id).map(pr=>pr.id));
          const segs = proj.schedules
            .filter(s=>s.buildingId===b.id && memberIds.has(s.processId))
            .map(s=>{
              const sd = fromDateStr(s.startDate), ed = fromDateStr(s.actualCompleteDate||s.endDate);
              if(ed < pageStart || sd > pageEnd) return null;
              const clipStart = sd < pageStart ? pageStart : sd;
              const clipEnd = ed > pageEnd ? pageEnd : ed;
              return { startIdx: diffDays(pageStart, clipStart), span: diffDays(clipStart, clipEnd)+1 };
            }).filter(Boolean);
          let cells = '';
          if(segs.length){
            const minIdx = Math.min(...segs.map(s=>s.startIdx));
            const maxIdx = Math.max(...segs.map(s=>s.startIdx+s.span));
            if(minIdx>0) cells += `<td class="gp-day-cell" colspan="${minIdx}"></td>`;
            cells += `<td class="gp-bar-cell" colspan="${maxIdx-minIdx}"><div class="gp-bar gp-group-bar"></div></td>`;
            if(maxIdx<days.length) cells += `<td class="gp-day-cell" colspan="${days.length-maxIdx}"></td>`;
          } else {
            cells = `<td class="gp-day-cell" colspan="${days.length}"></td>`;
          }
          return `<tr style="height:${rowMm}mm;"><td class="gp-row-label gp-group-label">${esc(row.group.name)}</td>${cells}</tr>`;
        }
        const pr = row.process;
        const segs = proj.schedules
          .filter(s=>s.buildingId===b.id && s.processId===pr.id)
          .map(s=>{
            const sd = fromDateStr(s.startDate), ed = fromDateStr(s.endDate);
            if(ed < pageStart || sd > pageEnd) return null; // 此排程與本頁日期範圍無重疊
            const clipStart = sd < pageStart ? pageStart : sd;
            const clipEnd = ed > pageEnd ? pageEnd : ed;
            const startIdx = diffDays(pageStart, clipStart);
            const span = diffDays(clipStart, clipEnd) + 1;
            const isDone = !!s.actualCompleteDate;
            const isLate = !isDone && ed < fromDateStr(todayStr());
            return { startIdx, span, label: compressFloorLabel(b, s.floors), cls: isDone?'gp-done':(isLate?'gp-late':'') };
          })
          .filter(Boolean)
          .sort((a,c)=>a.startIdx-c.startIdx);

        let cells = '';
        let i = 0, segPtr = 0;
        while(i < days.length){
          const seg = segs[segPtr];
          if(seg && seg.startIdx===i){
            // 色塊文字寬度上限＝色塊實際寬度，超出以…截斷，不會撐出格子
            const segWidthMm = seg.span * dayMm - 2;
            cells += `<td class="gp-bar-cell" colspan="${seg.span}"><div class="gp-bar ${seg.cls}" style="max-width:${segWidthMm}mm;">${esc(seg.label)}</div></td>`;
            i += seg.span; segPtr++;
          } else {
            cells += `<td class="gp-day-cell"></td>`;
            i += 1;
          }
        }
        const labelText = (row.indented ? '　└ ' : '') + pr.name;
        return `<tr style="height:${rowMm}mm;"><td class="gp-row-label ${row.indented?'gp-child-label':''}">${esc(labelText)}</td>${cells}</tr>`;
      }).join('');

      const pageNo = dpIdx * rowChunks.length + rcIdx + 1;
      pagesHtml.push(`
      <div class="gantt-print-page" style="--gp-label-fs:${labelFs}px;--gp-bar-fs:${barFs}px;">
        <div class="gp-header">
          <span>${esc(proj.name)}　${esc(b.name)}　預定工程進度表</span>
          <span>第 ${pageNo} / ${totalPages} 頁　${days.length?toDateStr(pageStart)+' ～ '+toDateStr(pageEnd):''}${rowChunks.length>1?`　（工項 ${rcIdx+1}/${rowChunks.length} 段）`:''}</span>
        </div>
        <div class="gp-canvas">
          <table class="gp-table">
            ${colgroup}
            <thead>${headRow}</thead>
            <tbody>${bodyRows}</tbody>
          </table>
        </div>
      </div>`);
    });
  });
  return pagesHtml.join('');
}
function exportGanttPDF(){
  const proj = currentProject();
  if(proj.processes.length===0){ showToast('尚未設定工序','error'); return; }
  const printRoot = document.getElementById('print-root');
  if(state.ganttMode==='all'){
    if(proj.buildings.length===0){ showToast('尚未建立棟別','error'); return; }
    printRoot.innerHTML = proj.buildings.map(b=>buildGanttPrintHTML(proj, b)).join('');
  } else {
    const b = currentBuilding();
    if(!b){ showToast('請先選擇棟別','error'); return; }
    printRoot.innerHTML = buildGanttPrintHTML(proj, b);
  }
  setTimeout(()=>{ window.print(); }, 60);
}
let ganttResizeState = {active:false, scheduleId:null, startX:0, origEnd:null, origStart:null};
function ganttResizeMouseDown(e, scheduleId){
  e.preventDefault(); e.stopPropagation();
  const proj = currentProject(); const s = proj.schedules.find(x=>x.id===scheduleId); if(!s) return;
  ganttResizeState = {active:true, scheduleId, startX:e.clientX, origEnd:fromDateStr(s.endDate), origStart:fromDateStr(s.startDate)};
}
document.addEventListener('mousemove', function(e){
  if(!ganttResizeState.active) return;
  const proj = currentProject(); const s = proj.schedules.find(x=>x.id===ganttResizeState.scheduleId); if(!s) return;
  const deltaDays = Math.round((e.clientX-ganttResizeState.startX)/GT_DAY_WIDTH);
  let newEnd = addDays(ganttResizeState.origEnd, deltaDays);
  if(newEnd < ganttResizeState.origStart) newEnd = new Date(ganttResizeState.origStart);
  s.endDate = toDateStr(newEnd);
  refreshScheduleBarDOM(s);
});
document.addEventListener('mouseup', function(){ if(ganttResizeState.active){ scheduleSave(); ganttResizeState={active:false,scheduleId:null}; } });

// 檢查若把 candidateId 設為 forId 的前置任務，是否會造成循環相依
function wouldCreateCycle(proj, forId, candidateId){
  if(forId===candidateId) return true;
  const visited = new Set();
  const stack = [candidateId];
  while(stack.length){
    const cur = stack.pop();
    if(cur===forId) return true;
    if(visited.has(cur)) continue;
    visited.add(cur);
    const s = proj.schedules.find(x=>x.id===cur);
    if(s) (s.dependsOn||[]).forEach(depId=>stack.push(depId));
  }
  return false;
}
function renderScheduleForm(){
  const proj = currentProject(); const fs = formState.schedForm;
  const b = proj.buildings.find(x=>x.id===fs.buildingId); const pr = proj.processes.find(x=>x.id===fs.processId);
  const floorChips = b.floors.map(fl=>`<button type="button" class="chip chip-floor ${fs.floors.includes(fl)?'selected':''}" onclick="toggleSchedFloor('${esc(fl)}')">${esc(fl)}</button>`).join('');
  // 前置任務候選：同一棟別、非自己、且選了不會造成循環相依的其他排程
  const candidates = proj.schedules.filter(s=>s.buildingId===fs.buildingId && (fs.mode!=='edit' || s.id!==fs.id));
  const depChips = candidates.map(s=>{
    const disabled = fs.mode==='edit' && wouldCreateCycle(proj, fs.id, s.id) && !fs.dependsOn.includes(s.id);
    return `<button type="button" class="chip ${fs.dependsOn.includes(s.id)?'selected':''}" ${disabled?'disabled title="選擇此項會造成循環相依"':''} onclick="toggleSchedDep('${s.id}')">${esc(scheduleLabel(proj,b,s))}</button>`;
  }).join('') || '<span class="hint">此棟別尚無其他排程可設為前置任務</span>';
  openModal(`
    <div class="modal modal-wide">
      <div class="modal-head"><h3>${fs.mode==='edit'?'編輯':'新增'}預定排程</h3><button class="icon-btn" onclick="closeModal()">${ICO.close}</button></div>
      <form onsubmit="return submitScheduleForm(event)">
        <div class="modal-body">
          <div class="hint" style="margin-bottom:12px;">${esc(b.name)}　・　${esc(pr.name)}</div>
          <div class="field">
            <label>適用樓層（可複選）</label>
            <div style="display:flex;gap:8px;margin-bottom:8px;">
              <button type="button" class="btn btn-sm" onclick="setSchedFloors('all')">全選</button>
              <button type="button" class="btn btn-sm" onclick="setSchedFloors('none')">清除</button>
            </div>
            <div class="floor-select-grid">${floorChips}</div>
          </div>
          <div class="field-row">
            <div class="field"><label>預定開始日</label><input type="date" id="sched-start" value="${fs.startDate}" required></div>
            <div class="field"><label>預定完成日</label><input type="date" id="sched-end" value="${fs.endDate}" required></div>
          </div>
          <div class="field"><label>實際完成日（選填，填寫後視為已完成）</label><input type="date" id="sched-actual" value="${fs.actualCompleteDate||''}"></div>
          <div class="field">
            <label>前置任務（需先完成才能施作此項目；沒有勾選代表可與其他項目並行作業）</label>
            <div class="chip-group">${depChips}</div>
            <div class="hint">若前置任務尚未完成，儲存時會自動將本項目的開始日順延到前置任務完成之後。</div>
          </div>
          <div class="field"><label>備註（選填）</label><textarea id="sched-note" rows="2" placeholder="例：待廠商確認到料日期">${esc(fs.note)}</textarea></div>
        </div>
        <div class="modal-foot">
          ${fs.mode==='edit' ? `<button type="button" class="btn btn-danger" onclick="deleteSchedule('${fs.id}')">刪除排程</button>` : ''}
          <span style="flex:1;"></span>
          <button type="button" class="btn" onclick="closeModal()">取消</button>
          <button type="submit" class="btn btn-primary">儲存</button>
        </div>
      </form>
    </div>`);
}
function toggleSchedFloor(fl){ const fs=formState.schedForm; const i=fs.floors.indexOf(fl); if(i>=0) fs.floors.splice(i,1); else fs.floors.push(fl); renderScheduleForm(); }
function setSchedFloors(mode){ const proj=currentProject(); const fs=formState.schedForm; const b=proj.buildings.find(x=>x.id===fs.buildingId); fs.floors = mode==='all'?[...b.floors]:[]; renderScheduleForm(); }
function toggleSchedDep(scheduleId){
  const proj = currentProject(); const fs = formState.schedForm;
  if(fs.mode==='edit' && wouldCreateCycle(proj, fs.id, scheduleId) && !fs.dependsOn.includes(scheduleId)){
    showToast('無法選擇：這會造成前置任務循環相依','error'); return;
  }
  const i = fs.dependsOn.indexOf(scheduleId);
  if(i>=0) fs.dependsOn.splice(i,1); else fs.dependsOn.push(scheduleId);
  renderScheduleForm();
}
function submitScheduleForm(e){
  e.preventDefault();
  const proj = currentProject(); const fs = formState.schedForm;
  if(fs.floors.length===0){ showToast('請至少選擇一個樓層','error'); return false; }
  let startDate = document.getElementById('sched-start').value;
  let endDate = document.getElementById('sched-end').value;
  const actualCompleteDate = document.getElementById('sched-actual').value || null;
  const note = document.getElementById('sched-note').value.trim();
  if(!startDate||!endDate) return false;
  if(fromDateStr(endDate) < fromDateStr(startDate)){ const t=startDate; startDate=endDate; endDate=t; }

  // 依前置任務自動順延開始日（保留原本工期天數）
  let adjusted = false;
  if(fs.dependsOn.length){
    const durationDays = diffDays(fromDateStr(startDate), fromDateStr(endDate));
    let minAllowedStart = null;
    fs.dependsOn.forEach(depId=>{
      const dep = proj.schedules.find(x=>x.id===depId); if(!dep) return;
      const depEnd = fromDateStr(dep.actualCompleteDate || dep.endDate);
      const allowed = addDays(depEnd, 1);
      if(!minAllowedStart || allowed > minAllowedStart) minAllowedStart = allowed;
    });
    if(minAllowedStart && fromDateStr(startDate) < minAllowedStart){
      startDate = toDateStr(minAllowedStart);
      endDate = toDateStr(addDays(minAllowedStart, durationDays));
      adjusted = true;
    }
  }

  if(fs.mode==='edit'){
    const s = proj.schedules.find(x=>x.id===fs.id);
    s.floors=fs.floors; s.startDate=startDate; s.endDate=endDate; s.actualCompleteDate=actualCompleteDate; s.note=note; s.dependsOn=fs.dependsOn;
  }else{
    proj.schedules.push({id:uid('sc'), buildingId:fs.buildingId, processId:fs.processId, floors:fs.floors, startDate, endDate, actualCompleteDate, note, dependsOn:fs.dependsOn});
  }
  scheduleSave(); closeModal(); render();
  showToast(adjusted ? '已儲存，並依前置任務自動順延開始日為 '+startDate : '已儲存預定排程');
  return false;
}
function deleteSchedule(id){
  const proj = currentProject();
  if(!confirm('確定刪除此筆預定排程？（若有其他排程將此項設為前置任務，該相依設定也會一併移除）')) return;
  proj.schedules = proj.schedules.filter(x=>x.id!==id);
  proj.schedules.forEach(s=>{ s.dependsOn = (s.dependsOn||[]).filter(depId=>depId!==id); });
  scheduleSave(); closeModal(); render();
  showToast('已刪除排程');
}

/* =====================  11. 施作紀錄（搜尋／分棟／連續樓層合併）  ===================== */
function recordMatchesFilter(proj, b, pr, r, tokens, dateStr){
  if(dateStr){
    const d = new Date(r.updatedAt);
    if(toDateStr(d)!==dateStr) return false;
  }
  if(tokens.length){
    const si = statusInfo(r.status);
    const hay = [b.name, pr.name, r.floor, partNames(proj,r.partIds), r.note||'', r.crew||'', si.label].join(' ').toLowerCase();
    if(!tokens.every(t=>hay.includes(t))) return false;
  }
  return true;
}
function groupRecordsForDisplay(proj, b, tokens, dateStr){
  const idx = new Map(b.floors.map((f,i)=>[f,i]));
  const rows = [];
  proj.processes.forEach(pr=>{
    const recs = proj.records.filter(r=>r.buildingId===b.id && r.processId===pr.id && recordMatchesFilter(proj,b,pr,r,tokens,dateStr));
    if(recs.length===0) return;
    const bySig = new Map();
    recs.forEach(r=>{
      const sig = r.progress+'|'+r.status+'|'+[...(r.partIds||[])].sort().join(',')+'|'+(r.note||'')+'|'+(r.crew||'')+'|'+(r.blockReason||'');
      if(!bySig.has(sig)) bySig.set(sig, []);
      bySig.get(sig).push(r);
    });
    bySig.forEach(list=>{
      list.sort((a,c)=>(idx.get(a.floor)??999)-(idx.get(c.floor)??999));
      let run=[list[0]];
      for(let i=1;i<list.length;i++){
        if(idx.get(list[i].floor)===idx.get(list[i-1].floor)+1){ run.push(list[i]); }
        else{ rows.push(makeRecordRow(pr,run)); run=[list[i]]; }
      }
      rows.push(makeRecordRow(pr,run));
    });
  });
  rows.sort((a,c)=>c.latestUpdate-a.latestUpdate);
  return rows;
}
function makeRecordRow(pr, run){
  const floors = run.map(r=>r.floor);
  const floorLabel = floors.length>1 ? `${floors[0]}–${floors[floors.length-1]}` : floors[0];
  return { process:pr, floors, floorLabel, floorCount:floors.length, firstFloor:floors[0],
    progress:run[0].progress, status:run[0].status, partIds:run[0].partIds, note:run[0].note, crew:run[0].crew, blockReason:run[0].blockReason||'',
    latestUpdate: Math.max(...run.map(r=>r.updatedAt)) };
}
function renderRecordsPage(proj){

    <div class="field-row" style="align-items:flex-end;margin-bottom:16px;flex-wrap:wrap;">

}
function renderRecordsList(proj){
  const kwRaw = (document.getElementById('rec-search-kw')?.value || '').trim().toLowerCase();
  const tokens = kwRaw ? kwRaw.split(/\s+/).filter(Boolean) : [];
  const dateStr = document.getElementById('rec-search-date')?.value || '';
  const sections = proj.buildings.map(b=>{

          <div class="t-sub">${esc(partNames(proj,row.partIds))}${row.floorCount>1?` ・ 共 ${row.floorCount} 層`:''} ・ ${fmtTime(row.latestUpdate)}${row.crew?' ・ '+esc(row.crew):''}${row.blockReason?` ・ <span style="color:var(--red-dk,#a12a21);font-weight:700;">⚠ ${esc(row.blockReason)}</span>`:''}${row.note?' ・ '+esc(row.note):''}</div>
        </div>
        <span class="badge" style="background:${si.bg};color:${si.fg};"><span class="dot" style="background:${si.dot};"></span>${row.progress}%</span>
      </div>`;
    }).join('');
    return `<div class="home-card" style="margin-bottom:14px;"><h4>${esc(b.name)}</h4>${rowsHtml}</div>`;
  }).join('');
  return sections || `<div class="empty-state"><h3>查無符合的施作紀錄</h3><p>請調整關鍵字或日期後再試一次。</p></div>`;
}

function setProcessGroup(processId, groupId){

}
function addProcessGroup(e){
  e.preventDefault(); const proj = currentProject(); const input = document.getElementById('new-group'); const name = input.value.trim();
  if(!name) return false;
  if(proj.processGroups.some(g=>g.name===name)){ showToast('此大項目已存在','error'); return false; }
  proj.processGroups.push({id:uid('grp'), name}); scheduleSave(); renderSettingsModal();
  return false;
}
function openRenameGroupModal(id){
  const proj = currentProject(); const g = proj.processGroups.find(x=>x.id===id); if(!g) return;
  const newName = prompt('大項目名稱', g.name);
  if(newName===null) return;
  const trimmed = newName.trim();
  if(!trimmed) return;
  g.name = trimmed; scheduleSave(); renderSettingsModal();
}
function deleteProcessGroup(id){
  const proj = currentProject(); const g = proj.processGroups.find(x=>x.id===id); if(!g) return;
  const memberCount = proj.processes.filter(pr=>pr.groupId===id).length;
  const msg = memberCount>0 ? `此大項目底下有 ${memberCount} 個工項，刪除分組後這些工項會變成未分組（工項本身不會被刪除）。確定刪除「${g.name}」？` : `確定刪除大項目「${g.name}」？`;
  if(!confirm(msg)) return;
  proj.processes.forEach(pr=>{ if(pr.groupId===id) pr.groupId=null; });
  proj.processGroups = proj.processGroups.filter(x=>x.id!==id);
  scheduleSave(); renderSettingsModal();

function addProcess(e){
  e.preventDefault(); const proj = currentProject(); const input = document.getElementById('new-process'); const name = input.value.trim();
  if(!name) return false;
  if(proj.processes.some(p=>p.name===name)){ showToast('此工序已存在','error'); return false; }
  proj.processes.push({id:uid('pr'), name, groupId:null}); scheduleSave(); renderSettingsModal();
  return false;
}
function deleteProcess(id){
  const proj = currentProject(); const pr = proj.processes.find(x=>x.id===id); if(!pr) return;
  const affected = proj.records.filter(r=>r.processId===id).length;
  const affectedSched = proj.schedules.filter(s=>s.processId===id).length;
  const parts=[]; if(affected>0) parts.push(`${affected} 筆進度記錄`); if(affectedSched>0) parts.push(`${affectedSched} 筆預定排程`);
  const msg = parts.length ? `此工序有 ${parts.join('、')}，刪除後將一併移除。確定刪除「${pr.name}」？` : `確定刪除工序「${pr.name}」？`;
  if(!confirm(msg)) return;
  proj.processes = proj.processes.filter(x=>x.id!==id);
  proj.records = proj.records.filter(r=>r.processId!==id);
  const removedSchedIds = new Set(proj.schedules.filter(s=>s.processId===id).map(s=>s.id));
  proj.schedules = proj.schedules.filter(s=>s.processId!==id);
  proj.schedules.forEach(s=>{ s.dependsOn = (s.dependsOn||[]).filter(depId=>!removedSchedIds.has(depId)); });
  scheduleSave(); renderSettingsModal();
}
function moveProcess(id,dir){
  const proj = currentProject(); const idx = proj.processes.findIndex(x=>x.id===id); const newIdx=idx+dir;
  if(newIdx<0||newIdx>=proj.processes.length) return;
  const [item] = proj.processes.splice(idx,1); proj.processes.splice(newIdx,0,item);
  scheduleSave(); renderSettingsModal();
}
function addPart(e){
  e.preventDefault(); const proj = currentProject(); const input = document.getElementById('new-part'); const name = input.value.trim();
  if(!name) return false;
  if(proj.parts.some(p=>p.name===name)){ showToast('此部位分類已存在','error'); return false; }
  proj.parts.push({id:uid('pt'), name}); scheduleSave(); renderSettingsModal();
  return false;
}
function deletePart(id){
  const proj = currentProject(); const pt = proj.parts.find(x=>x.id===id); if(!pt) return;
  if(!confirm(`確定刪除部位分類「${pt.name}」？既有記錄中的此標籤也會一併移除。`)) return;
  proj.parts = proj.parts.filter(x=>x.id!==id);
  proj.records.forEach(r=>{ r.partIds=(r.partIds||[]).filter(pid=>pid!==id); });
  scheduleSave(); renderSettingsModal();
}

      <div class="modal-body">
        ${list}
        <button class="btn btn-primary btn-block" style="margin-top:6px;" onclick="openRecordForm('${buildingId}','${esc(floor)}','${processId}',null)">${ICO.plus} 新增施作記錄</button>
      </div>
    </div>`);
}
function deleteRecordConfirm(recordId){
  const proj = currentProject(); if(!confirm('確定刪除此筆記錄？')) return;
  proj.records = proj.records.filter(r=>r.id!==recordId);
  scheduleSave(); renderCellModal();
}
function openRecordForm(buildingId, floor, processId, recordId){
  const proj = currentProject(); const existing = recordId ? proj.records.find(r=>r.id===recordId) : null;
  formState.recForm = { buildingId, floor, processId, recordId,
    partIds: existing?[...(existing.partIds||[])]:[], progress: existing?existing.progress:0,
    status: existing?existing.status:'in_progress', note: existing?(existing.note||''):'', crew: existing?(existing.crew||''):'',
    photo: existing?(existing.photo||null):null, blockReason: existing?(existing.blockReason||''):'' };
  renderRecordForm();
}
function renderRecordForm(){
  const proj = currentProject(); const fs = formState.recForm;
  const b = proj.buildings.find(x=>x.id===fs.buildingId); const pr = proj.processes.find(x=>x.id===fs.processId);
  const chips = proj.parts.map(pt=>`<button type="button" class="chip ${fs.partIds.includes(pt.id)?'selected':''}" onclick="toggleRecPart('${pt.id}')">${esc(pt.name)}</button>`).join('');
  const statusBtns = STATUS_ORDER.map(k=>{ const s=STATUS[k]; return `<button type="button" class="status-btn ${fs.status===k?'selected':''}" style="color:${s.fg};" onclick="setRecStatus('${k}')"><span class="dot" style="background:${s.dot};width:8px;height:8px;border-radius:50%;display:inline-block;"></span>${s.label}</button>`; }).join('');
  openModal(`
    <div class="modal">
      <div class="modal-head"><h3>${fs.recordId?'編輯':'新增'}施作記錄</h3><button class="icon-btn" onclick="renderCellModal()">${ICO.close}</button></div>
      <form onsubmit="return submitRecord(event)">
        <div class="modal-body">
          <div class="hint" style="margin-bottom:12px;">${esc(b.name)}　${esc(fs.floor)}　・　${esc(pr.name)}</div>
          <div class="field"><label>適用部位（可複選，不選代表全區域）</label><div class="chip-group">${chips}</div></div>
          <div class="field"><label>工程狀態</label><div class="status-btn-group">${statusBtns}</div></div>
          <div class="field">
            <label>施作進度</label>
            <div class="range-wrap">
              <input type="range" min="0" max="100" step="5" id="rec-progress" value="${fs.progress}" oninput="document.getElementById('rec-progress-val').textContent=this.value+'%'">
              <span class="range-val" id="rec-progress-val">${fs.progress}%</span>
            </div>
          </div>
          <div class="field-row">
            <div class="field"><label>負責工班（選填）</label><input type="text" id="rec-crew" value="${esc(fs.crew)}" placeholder="例：昌盛防水班" list="crew-suggest"></div>
            <div class="field"><label>卡點原因（選填）</label><select id="rec-block"><option value="">無卡點</option>${BLOCK_REASONS.map(r=>`<option value="${esc(r)}" ${fs.blockReason===r?'selected':''}>${esc(r)}</option>`).join('')}</select></div>
          </div>
          <datalist id="crew-suggest">${[...new Set(proj.records.map(r=>r.crew).filter(Boolean))].map(c=>`<option value="${esc(c)}">`).join('')}</datalist>
          <div class="field"><label>備註（選填）</label><textarea id="rec-note" rows="2" placeholder="例：逐步往下施作中">${esc(fs.note)}</textarea></div>
          <div class="field">
            <label>照片（選填）</label>
            <input type="file" accept="image/*" capture="environment" onchange="handleRecordPhoto(event)">
            <div id="rec-photo-preview">${fs.photo?`<img class="photo-preview" src="${fs.photo}">`:''}</div>
          </div>
        </div>
        <div class="modal-foot">
          <button type="button" class="btn" onclick="renderCellModal()">返回</button>
          <button type="submit" class="btn btn-primary">儲存記錄</button>
        </div>
      </form>
    </div>`);
}
function toggleRecPart(id){ const fs=formState.recForm; const i=fs.partIds.indexOf(id); if(i>=0) fs.partIds.splice(i,1); else fs.partIds.push(id); renderRecordForm(); }
function setRecStatus(key){ formState.recForm.status = key; if(key==='done') formState.recForm.progress=100; renderRecordForm(); }
function fileToResizedDataURL(file, maxW, quality){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        const scale = Math.min(1, maxW/img.width);
        const w = Math.round(img.width*scale), h = Math.round(img.height*scale);
        const canvas = document.createElement('canvas'); canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject; img.src = reader.result;
    };
    reader.onerror = reject; reader.readAsDataURL(file);
  });
}
async function handleRecordPhoto(e){
  const file = e.target.files[0]; if(!file) return;
  try{ const dataUrl = await fileToResizedDataURL(file, 480, 0.6); formState.recForm.photo = dataUrl;
    document.getElementById('rec-photo-preview').innerHTML = `<img class="photo-preview" src="${dataUrl}">`;
  }catch(err){ showToast('照片處理失敗','error'); }
}
function submitRecord(e){
  e.preventDefault();
  const proj = currentProject(); const fs = formState.recForm;
  const progress = Number(document.getElementById('rec-progress').value);
  const crew = document.getElementById('rec-crew').value.trim();
  const note = document.getElementById('rec-note').value.trim();
  const blockReason = document.getElementById('rec-block').value;
  if(fs.recordId){
    const r = proj.records.find(x=>x.id===fs.recordId);
    r.partIds=fs.partIds; r.progress=progress; r.status=fs.status; r.note=note; r.crew=crew; r.photo=fs.photo; r.blockReason=blockReason; r.updatedAt=Date.now();
  }else{
    proj.records.push({id:uid('r'), buildingId:fs.buildingId, floor:fs.floor, processId:fs.processId, partIds:fs.partIds, progress, status:fs.status, note, crew, photo:fs.photo, blockReason, updatedAt:Date.now()});
  }
  scheduleSave();
  formState.cell = {buildingId:fs.buildingId, floor:fs.floor, processId:fs.processId};
  renderCellModal(); render();
  showToast('已儲存進度記錄');
  return false;
}

/* =====================  13. 快速新增進度（現場主要操作流程）  ===================== */
function openQuickAddModal(presetBuildingId){
  const proj = currentProject();
  const b = presetBuildingId ? proj.buildings.find(x=>x.id===presetBuildingId) : currentBuilding();
  formState.quickAdd = {
    projectId: proj.id, buildingId: b?b.id:(proj.buildings[0]?proj.buildings[0].id:null),
    floors: [], partIds: [], processId: proj.processes[0]?proj.processes[0].id:null,
    progress: 50, status: 'in_progress', note: '', crew: '', photo: null, blockReason: ''
  };
  renderQuickAddForm();
}
/* ---------- 常用模板：儲存案場/棟別/部位/工序/狀態/工班/備註，套用時只需改樓層與比例 ---------- */
function saveQuickTemplate(){
  const fs = formState.quickAdd;
  // 先把表單目前輸入值同步回 fs（select/input 不會自動回寫）
  syncQuickFormToState();
  const name = prompt('模板名稱（例：AB棟南側矽膠收縫）');
  if(name===null) return;
  const trimmed = name.trim(); if(!trimmed){ showToast('請輸入模板名稱','error'); return; }
  if(state.quickTemplates.length>=20){ showToast('模板數量已達上限（20組），請先刪除不用的模板','error'); return; }
  state.quickTemplates.push({ id:uid('tp'), name:trimmed,
    projectId:fs.projectId, buildingId:fs.buildingId, partIds:[...fs.partIds], processId:fs.processId,
    status:fs.status, crew:fs.crew, note:fs.note, blockReason:fs.blockReason });
  scheduleSave(); renderQuickAddForm();
  showToast('已儲存模板「'+trimmed+'」');
}
function applyQuickTemplate(id){
  const tp = state.quickTemplates.find(t=>t.id===id); if(!tp) return;
  const proj = state.projects.find(p=>p.id===tp.projectId);
  if(!proj){ showToast('此模板的案場已不存在','error'); return; }
  const fs = formState.quickAdd;
  fs.projectId = tp.projectId;
  fs.buildingId = proj.buildings.find(x=>x.id===tp.buildingId) ? tp.buildingId : (proj.buildings[0]?proj.buildings[0].id:null);
  fs.partIds = tp.partIds.filter(pid=>proj.parts.some(pt=>pt.id===pid));
  fs.processId = proj.processes.some(pr=>pr.id===tp.processId) ? tp.processId : (proj.processes[0]?proj.processes[0].id:null);
  fs.status = tp.status; fs.crew = tp.crew||''; fs.note = tp.note||''; fs.blockReason = tp.blockReason||'';
  fs.floors = []; // 樓層與比例由使用者自行設定
  renderQuickAddForm();
  showToast('已套用模板，請選擇樓層與完成比例');
}
function deleteQuickTemplate(id){
  const tp = state.quickTemplates.find(t=>t.id===id); if(!tp) return;
  if(!confirm(`刪除模板「${tp.name}」？`)) return;
  state.quickTemplates = state.quickTemplates.filter(t=>t.id!==id);
  scheduleSave(); renderQuickAddForm();
}
function syncQuickFormToState(){
  const fs = formState.quickAdd;
  const pEl=document.getElementById('qa-process'), gEl=document.getElementById('qa-progress'),
        cEl=document.getElementById('qa-crew'), nEl=document.getElementById('qa-note'), bEl=document.getElementById('qa-block');
  if(pEl) fs.processId = pEl.value;
  if(gEl) fs.progress = Number(gEl.value);
  if(cEl) fs.crew = cEl.value.trim();
  if(nEl) fs.note = nEl.value.trim();
  if(bEl) fs.blockReason = bEl.value;
}
function renderQuickAddForm(){
  const fs = formState.quickAdd;
  const proj = state.projects.find(p=>p.id===fs.projectId);
  const projectOpts = state.projects.map(p=>`<option value="${p.id}" ${p.id===fs.projectId?'selected':''}>${esc(p.name)}</option>`).join('');
  if(!proj.buildings.length){
    openModal(`<div class="modal"><div class="modal-head"><h3>快速新增進度</h3><button class="icon-btn" onclick="closeModal()">${ICO.close}</button></div>
      <div class="modal-body"><div class="empty-state"><h3>此案場尚無棟別</h3><p>請先新增棟別後再登錄進度。</p>
      <button class="btn btn-primary" onclick="closeModal();openAddBuildingModal();">${ICO.plus} 新增棟別</button></div></div></div>`);
    return;
  }
  const b = proj.buildings.find(x=>x.id===fs.buildingId) || proj.buildings[0];
  fs.buildingId = b.id;
  const buildingOpts = proj.buildings.map(x=>`<option value="${x.id}" ${x.id===fs.buildingId?'selected':''}>${esc(x.name)}</option>`).join('');
  const processOpts = proj.processes.map(x=>`<option value="${x.id}" ${x.id===fs.processId?'selected':''}>${esc(x.name)}</option>`).join('');
  const floorChips = b.floors.map(fl=>`<button type="button" class="chip chip-floor ${fs.floors.includes(fl)?'selected':''}" onclick="toggleQuickFloor('${esc(fl)}')">${esc(fl)}</button>`).join('');
  const floorOpts = b.floors.map(fl=>`<option value="${esc(fl)}">${esc(fl)}</option>`).join('');
  const partChips = proj.parts.map(pt=>`<button type="button" class="chip ${fs.partIds.includes(pt.id)?'selected':''}" onclick="toggleQuickPart('${pt.id}')">${esc(pt.name)}</button>`).join('');
  const statusBtns = STATUS_ORDER.map(k=>{ const s=STATUS[k]; return `<button type="button" class="status-btn ${fs.status===k?'selected':''}" style="color:${s.fg};" onclick="setQuickStatus('${k}')"><span class="dot" style="background:${s.dot};width:8px;height:8px;border-radius:50%;display:inline-block;"></span>${s.label}</button>`; }).join('');

  openModal(`
    <div class="modal modal-wide">
      <div class="modal-head"><h3>快速新增進度</h3><button class="icon-btn" onclick="closeModal()">${ICO.close}</button></div>
      <form onsubmit="return submitQuickAdd(event)">
        <div class="modal-body">
          <div class="field" style="margin-bottom:10px;">
            <label>常用模板（點擊套用，只需再選樓層與比例）</label>
            <div class="chip-group">
              ${state.quickTemplates.map(tp=>`<span class="chip tpl-chip" onclick="applyQuickTemplate('${tp.id}')">${esc(tp.name)}<button type="button" class="tpl-del" onclick="event.stopPropagation();deleteQuickTemplate('${tp.id}')" title="刪除模板">×</button></span>`).join('')}
              <button type="button" class="chip" style="border-style:dashed;" onclick="saveQuickTemplate()">${ICO.plus} 儲存目前選擇為模板</button>
            </div>
          </div>
          <button type="button" class="btn btn-sm" style="margin-bottom:14px;" onclick="copyLastEntry()">${ICO.copy} 複製上一筆進度</button>
          <div class="field-row">
            <div class="field"><label>① 案場</label><select id="qa-project" onchange="changeQuickProject(this.value)">${projectOpts}</select></div>
            <div class="field"><label>② 棟別</label><select id="qa-building" onchange="changeQuickBuilding(this.value)">${buildingOpts}</select></div>
          </div>
          <div class="field">
            <label>③ 樓層（可複選，或用範圍快速選取）</label>
            <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;align-items:center;">
              <select id="qa-floor-from" style="width:auto;">${floorOpts}</select>
              <span style="color:var(--ink-faint);">到</span>
              <select id="qa-floor-to" style="width:auto;">${floorOpts}</select>
              <button type="button" class="btn btn-sm" onclick="applyQuickFloorRange()">套用範圍</button>
              <button type="button" class="btn btn-sm" onclick="setQuickFloors('all')">全選</button>
              <button type="button" class="btn btn-sm" onclick="setQuickFloors('none')">清除</button>
            </div>
            <div class="floor-select-grid">${floorChips}</div>
          </div>
          <div class="field"><label>④ 部位（可複選，不選代表全區域）</label><div class="chip-group">${partChips}</div></div>
          <div class="field"><label>⑤ 工序</label><select id="qa-process">${processOpts}</select></div>
          <div class="field"><label>⑥ 完成比例</label>
            <div class="range-wrap">
              <input type="range" min="0" max="100" step="5" id="qa-progress" value="${fs.progress}" oninput="document.getElementById('qa-progress-val').textContent=this.value+'%'">
              <span class="range-val" id="qa-progress-val">${fs.progress}%</span>
            </div>
          </div>
          <div class="field"><label>工程狀態</label><div class="status-btn-group">${statusBtns}</div></div>
          <div class="field-row">
            <div class="field"><label>負責工班（選填）</label><input type="text" id="qa-crew" value="${esc(fs.crew)}" placeholder="例：昌盛防水班" list="qa-crew-suggest"></div>
            <div class="field"><label>卡點原因（選填）</label><select id="qa-block"><option value="">無卡點</option>${BLOCK_REASONS.map(r=>`<option value="${esc(r)}" ${fs.blockReason===r?'selected':''}>${esc(r)}</option>`).join('')}</select></div>
          </div>
          <datalist id="qa-crew-suggest">${[...new Set(proj.records.map(r=>r.crew).filter(Boolean))].map(c=>`<option value="${esc(c)}">`).join('')}</datalist>
          <div class="field"><label>⑦ 備註（選填）</label><textarea id="qa-note" rows="2" placeholder="例：逐步往下施作中">${esc(fs.note)}</textarea></div>
          <div class="field"><label>照片（選填）</label><input type="file" accept="image/*" capture="environment" onchange="handleQuickPhoto(event)"><div id="qa-photo-preview">${fs.photo?`<img class="photo-preview" src="${fs.photo}">`:''}</div></div>
          <div class="hint">套用至已選樓層：相同棟別＋樓層＋工序＋部位組合會覆蓋原有進度，其餘會新增。</div>
        </div>
        <div class="modal-foot"><button type="button" class="btn" onclick="closeModal()">取消</button><button type="submit" class="btn btn-primary btn-lg">儲存進度</button></div>
      </form>
    </div>`);
}
function changeQuickProject(id){ formState.quickAdd.projectId=id; formState.quickAdd.buildingId=null; formState.quickAdd.floors=[]; renderQuickAddForm(); }
function changeQuickBuilding(id){ syncQuickFormToState(); formState.quickAdd.buildingId=id; formState.quickAdd.floors=[]; renderQuickAddForm(); }
function toggleQuickFloor(fl){ syncQuickFormToState(); const fs=formState.quickAdd; const i=fs.floors.indexOf(fl); if(i>=0) fs.floors.splice(i,1); else fs.floors.push(fl); renderQuickAddForm(); }
function toggleQuickPart(id){ syncQuickFormToState(); const fs=formState.quickAdd; const i=fs.partIds.indexOf(id); if(i>=0) fs.partIds.splice(i,1); else fs.partIds.push(id); renderQuickAddForm(); }
function setQuickStatus(key){ syncQuickFormToState(); formState.quickAdd.status=key; if(key==='done') formState.quickAdd.progress=100; renderQuickAddForm(); }
function setQuickFloors(mode){
  syncQuickFormToState();
  const proj = state.projects.find(p=>p.id===formState.quickAdd.projectId);
  const b = proj.buildings.find(x=>x.id===formState.quickAdd.buildingId);
  formState.quickAdd.floors = mode==='all' ? [...b.floors] : [];
  renderQuickAddForm();
}
function applyQuickFloorRange(){
  syncQuickFormToState();
  const proj = state.projects.find(p=>p.id===formState.quickAdd.projectId);
  const b = proj.buildings.find(x=>x.id===formState.quickAdd.buildingId);
  const from = document.getElementById('qa-floor-from').value, to = document.getElementById('qa-floor-to').value;
  const i1 = b.floors.indexOf(from), i2 = b.floors.indexOf(to);
  if(i1<0||i2<0) return;
  const lo = Math.min(i1,i2), hi = Math.max(i1,i2);
  const range = b.floors.slice(lo, hi+1);
  const set = new Set([...formState.quickAdd.floors, ...range]);
  formState.quickAdd.floors = [...set];
  renderQuickAddForm();
}
async function handleQuickPhoto(e){
  const file = e.target.files[0]; if(!file) return;
  try{ const dataUrl = await fileToResizedDataURL(file, 480, 0.6); formState.quickAdd.photo = dataUrl;
    document.getElementById('qa-photo-preview').innerHTML = `<img class="photo-preview" src="${dataUrl}">`;
  }catch(err){ showToast('照片處理失敗','error'); }
}
function copyLastEntry(){
  const proj = state.projects.find(p=>p.id===formState.quickAdd.projectId);
  const last = [...proj.records].sort((a,c)=>c.updatedAt-a.updatedAt)[0];
  if(!last){ showToast('此案場尚無歷史紀錄可複製','error'); return; }
  const fs = formState.quickAdd;
  fs.buildingId = last.buildingId; fs.floors = [last.floor]; fs.partIds = [...(last.partIds||[])];
  fs.processId = last.processId; fs.progress = last.progress; fs.status = last.status;
  fs.note = last.note||''; fs.crew = last.crew||''; fs.photo = last.photo||null; fs.blockReason = last.blockReason||'';
  renderQuickAddForm();
  showToast('已複製上一筆進度，請確認後儲存');
}
function submitQuickAdd(e){
  e.preventDefault();
  const fs = formState.quickAdd;
  const proj = state.projects.find(p=>p.id===fs.projectId);
  const processId = document.getElementById('qa-process').value;
  const progress = Number(document.getElementById('qa-progress').value);
  const crew = document.getElementById('qa-crew').value.trim();
  const note = document.getElementById('qa-note').value.trim();
  const blockReason = document.getElementById('qa-block').value;
  if(fs.floors.length===0){ showToast('請至少選擇一個樓層','error'); return false; }
  const partKey = [...fs.partIds].sort().join(',');
  const now = Date.now();
  fs.floors.forEach(floor=>{
    const match = proj.records.find(r=>r.buildingId===fs.buildingId && r.floor===floor && r.processId===processId && [...(r.partIds||[])].sort().join(',')===partKey);
    if(match){ match.progress=progress; match.status=fs.status; match.note=note; match.crew=crew; match.blockReason=blockReason; if(fs.photo) match.photo=fs.photo; match.updatedAt=now; }
    else{ proj.records.push({id:uid('r'), buildingId:fs.buildingId, floor, processId, partIds:[...fs.partIds], progress, status:fs.status, note, crew, photo:fs.photo, blockReason, updatedAt:now}); }
  });
  state.activeProjectId = fs.projectId; state.activeBuildingId = fs.buildingId;
  if(state.view==='home') state.view='buildings';
  scheduleSave(); closeModal(); render();
  showToast(`已套用至 ${fs.floors.length} 個樓層`);
  return false;
}

/* =====================  14. 啟動  ===================== */
loadState();
</script>
